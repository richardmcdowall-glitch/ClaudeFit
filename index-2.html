                <span style={{color:C.orange}}>F{r.meal.fat_g}g</span>
                <span style={{color:C.blue}}>C{r.meal.carbs_g}g</span>
              </div>
              {r.meal.description&&<div style={{fontSize:10,color:C.textDim,fontFamily:SANS,marginTop:1}}>{r.meal.description}</div>}
              {searchAdd===i&&<div style={{display:"flex",gap:6,alignItems:"center",marginTop:4,padding:"4px 0",flexWrap:"wrap"}}>
                <input type="date" value={searchDate} onChange={e=>setSearchDate(e.target.value)} style={{background:C.cardAlt,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 6px",fontSize:11,color:C.text,fontFamily:MONO,outline:"none"}}/>
                <input type="time" value={searchTime} onChange={e=>setSearchTime(e.target.value)} style={{background:C.cardAlt,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:C.text,fontFamily:MONO,outline:"none"}}/>
                <button onClick={()=>addFromSearch(r.meal)} style={sty.btn(C.green,true)}>Add</button>
                <button onClick={()=>setSearchAdd(null)} style={sty.btn(C.surface,true)}>✕</button>
              </div>}
            </div>))}
          {results.length>30&&<div style={{fontSize:10,color:C.textDim,textAlign:"center",padding:8,fontFamily:SANS}}>Showing first 30 of {results.length}</div>}
        </div>);
      })()}
    </div>)}
  </div>);
}

// ─── SETTINGS ───────────────────────────────────────────────────────────────
function Settings({plans,setPlans,gym,health,ftp,setFtp,z2Target,setZ2Target,exReg,setExReg,onPlanChange,idMap,profile,setProfile}) {
  const [tab,setTab]=useState("dev");
  const [devNotes,setDevNotes]=useState("");const [devSS,setDevSS]=useState(null);
  const [expDays,setExpDays]=useState(14);const [expText,setExpText]=useState("");const [copied,setCopied]=useState(false);const [expType,setExpType]=useState("gym");
  const [planName,setPlanName]=useState("");const [editPlanId,setEditPlanId]=useState(null);const [planStart,setPlanStart]=useState(todayStr());
  const emptyDays=()=>DAYS.reduce((o,d)=>({...o,[d]:{label:"",supersets:[]}}),{});
  const [bDays,setBDays]=useState(emptyDays);const [bDay,setBDay]=useState("Mon");
  const [addExName,setAddExName]=useState("");const [addExSets,setAddExSets]=useState("4");const [addExReps,setAddExReps]=useState("8-12");const [addExWt,setAddExWt]=useState("");const [addExUnit,setAddExUnit]=useState("kg");const [addExSpin,setAddExSpin]=useState(false);
  const [ssMode,setSsMode]=useState(false);const [ssBuf,setSsBuf]=useState([]);const [copyTargets,setCopyTargets]=useState(null);const [editExKey,setEditExKey]=useState(null);const [editExVal,setEditExVal]=useState("");
  const [expPlan,setExpPlan]=useState(null);
  const [nameIn,setNameIn]=useState(profile?.name||"");const [wtIn,setWtIn]=useState(profile?.weightTarget?String(profile.weightTarget):"");const [apiKeyIn,setApiKeyIn]=useState(profile?.apiKey||"");
  const [calFloorIn,setCalFloorIn]=useState(profile?.calFloor?String(profile.calFloor):"1800");const [calCeilIn,setCalCeilIn]=useState(profile?.calCeil?String(profile.calCeil):"2000");
  const [wpk1In,setWpk1In]=useState(profile?.wpk1?String(profile.wpk1):"2.5");const [wpk2In,setWpk2In]=useState(profile?.wpk2?String(profile.wpk2):"3.0");
  const [pFtpIn,setPFtpIn]=useState(ftp?String(ftp):"");const [pZ2In,setPZ2In]=useState(z2Target?String(z2Target):"");
  const [ewcUrlIn,setEwcUrlIn]=useState(profile?.ewcUrl||PD.ewcUrl);const [z2UrlIn,setZ2UrlIn]=useState(profile?.z2Url||PD.z2Url);
  const saveProfile=async()=>{const p={name:nameIn.trim(),weightTarget:parseFloat(wtIn)||PD.weightTarget,apiKey:apiKeyIn.trim(),calFloor:parseInt(calFloorIn)||PD.calFloor,calCeil:parseInt(calCeilIn)||PD.calCeil,wpk1:parseFloat(wpk1In)||PD.wpk1,wpk2:parseFloat(wpk2In)||PD.wpk2,ewcUrl:ewcUrlIn.trim()||PD.ewcUrl,z2Url:z2UrlIn.trim()||PD.z2Url};setProfile(p);await save(K.profile,p);const fv=parseFloat(pFtpIn);if(fv){setFtp(fv);await save(K.ftp,fv);}const zv=parseFloat(pZ2In);if(zv){setZ2Target(zv);await save(K.z2Target,zv);}};
  const [confirmClear,setConfirmClear]=useState(false);
  const clearAllData=()=>{if(hasLocalStorage){Object.values(K).forEach(k=>{try{localStorage.removeItem(k);}catch{}});}window.location.reload();};
  useEffect(()=>{const h=e=>setTab(e.detail);window.addEventListener("claudefit-settings-tab",h);return()=>window.removeEventListener("claudefit-settings-tab",h);},[]);
  useEffect(()=>{load(K.devNotes).then(d=>{if(d)setDevNotes(d);});},[]);
  const saveDevNotes=(t)=>{setDevNotes(t);optimisticSave(K.devNotes,t,null,s=>{setDevSS(s);setTimeout(()=>setDevSS(null),2000);});};
  const exName=(id,entry)=>(entry?.exSwaps?.[id])||idMap[id]||id;

  const genExport=()=>{const cut=new Date();if(expDays<9999)cut.setDate(cut.getDate()-expDays);else cut.setFullYear(2000);
    if(expType==="gym"){
      const lines=Object.entries(gym||{}).filter(([d])=>new Date(d)>=cut).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,e])=>{
        const p=[`${d} (${e.day||"?"}) C${e.mesoCycle||"?"} Meso:${e.mesoWeek??0}/3`];
        if(e.bodyWeight)p.push(`BW:${e.bodyWeight}kg`);if(e.feel)p.push(`Feel:${e.feel}`);
        Object.entries(e.sets||{}).forEach(([id,arr])=>{const done=arr.filter(s=>s.done);const name=exName(id,e);
          if(done.length)p.push(`${name}: ${done.map(s=>s.avgWatts?`${s.avgWatts}W/${s.duration||"?"}min HR:${s.avgHR||"?"}`:`${s.weight||"?"}kg×${s.reps||"?"}`).join(", ")}`);});
        if(e.notes)p.push(`Notes: ${e.notes}`);return p.join(" | ");});
      setExpText(lines.join("\n")||"No gym data.");
    } else if(expType==="food"){
      const entries=[...health].filter(e=>new Date(e.date)>=cut&&(e.calories||e.meals?.length)).sort((a,b)=>a.date.localeCompare(b.date));
      const lines=entries.map(e=>{
        const cal=e.calories||0,prot=e.protein||0,fat=e.fat||0,carbs=e.carbs||0;
        let line=`${e.date} | ${cal}kcal P:${prot}g F:${fat}g C:${carbs}g`;
        if(e.weight)line+=` | BW:${e.weight}kg`;
        if(e.mood)line+=` | Mood:${e.mood}/5`;
        if(e.meals?.length){line+="\n  "+e.meals.map(m=>`${m.time||""} ${m.name}: ${m.calories}kcal P${m.protein_g}g F${m.fat_g}g C${m.carbs_g}g${m.description?" ("+m.description+")":""}`).join("\n  ");}
        return line;});
      setExpText(lines.join("\n")||"No food data.");
    } else if(expType==="plan"){
      const ap=plans.find(p=>{const a=p.activations||[];return a.length&&a[a.length-1].to===null;})||plans[0]||DEFAULT_PLAN;
      if(!ap){setExpText("No active plan.");setCopied(false);return;}
      const lines=[`Plan: ${ap.name}`,`Active since: ${(ap.activations||[]).slice(-1)[0]?.from||"?"}`,""];
      Object.entries(ap.days||{}).forEach(([day,d])=>{
        if(!d.supersets?.length){lines.push(`${day}: Rest`);return;}
        lines.push(`${day}: ${d.label||"Training"}`);
        d.supersets.forEach(ss=>{const isSS=ss.exercises.length>1;
          if(isSS)lines.push(`  SS: ${ss.exercises.map(e=>e.name).join(" + ")}`);
          ss.exercises.forEach(e=>{lines.push(`  ${isSS?"  ":""}${e.name}: ${e.baseSets} sets × ${e.reps}${e.baseWeight?` @ ${e.baseWeight}${e.unit}`:` (${e.unit})`}${e.trackWatts?" [spinning]":""}${e.trackGrip?" [grip tracked]":""}`);});});
        lines.push("");});
      setExpText(lines.join("\n"));
    } else if(expType==="json"){
      const data={};
      if(health?.length)data.health=health;
      if(gym&&Object.keys(gym).length)data.log=gym;
      if(plans?.length)data.plans=plans;
      if(ftp)data.ftp=ftp;
      if(z2Target)data.z2Target=z2Target;
      if(exReg&&Object.keys(exReg).length)data.exRegistry=exReg;
      // Read remaining keys from localStorage
      if(hasLocalStorage){
        [["foodNotes",K.foodNotes],["favMeals",K.favMeals],["devNotes",K.devNotes],["meta",K.meta]].forEach(([p,sk])=>{
          try{const v=localStorage.getItem(sk);if(v)data[p]=JSON.parse(v);}catch{}});
      }
      setExpText(JSON.stringify(data));
    }
    setCopied(false);};
  const reactivate=async(id)=>{const now=todayStr();const up=plans.map(p=>{const a=p.activations||[];if(a.length&&a[a.length-1].to===null)return{...p,activations:[...a.slice(0,-1),{from:a[a.length-1].from,to:now}]};if(p.id===id)return{...p,activations:[...a,{from:now,to:null}]};return p;});const ok=await save(K.plans,up);if(ok){setPlans(up);if(onPlanChange)onPlanChange();}};

  const addExToPlan=()=>{
    if(!addExName.trim())return;
    const ex={id:`${bDay}_${Date.now()}`,name:addExName.trim(),baseSets:parseInt(addExSets)||4,reps:addExReps||"8-12",baseWeight:parseFloat(addExWt)||0,unit:addExUnit,trackWatts:addExSpin,trackGrip:/pull.?up/i.test(addExName)};
    const muscle=detectMuscle(addExName);if(muscle)ex.muscle=muscle;
    if(ssMode){setSsBuf(prev=>[...prev,ex]);setAddExName("");return;}
    const nd={...bDays};const d=nd[bDay];
    d.supersets=[...d.supersets,{id:`ss_${Date.now()}`,name:ex.name,exercises:[ex]}];
    if(!d.label)d.label=addExSpin?"Spinning":"Training";
    setBDays(nd);setAddExName("");setAddExWt("");
  };
  const commitSS=()=>{
    if(ssBuf.length<2)return;
    const nd={...bDays};const d=nd[bDay];
    d.supersets=[...d.supersets,{id:`ss_${Date.now()}`,name:ssBuf.map(e=>e.name).join(" + "),exercises:ssBuf}];
    if(!d.label)d.label="Training";
    setBDays(nd);setSsBuf([]);setSsMode(false);
  };
  const rmSS=(dayKey,ssIdx)=>{const nd={...bDays};nd[dayKey].supersets=nd[dayKey].supersets.filter((_,i)=>i!==ssIdx);setBDays(nd);};
  const setDayLabel=(dayKey,label)=>{const nd={...bDays};nd[dayKey].label=label;setBDays(nd);};
  const confirmPlan=async()=>{
    const start=planStart||todayStr();
    let updated;
    if(editPlanId){
      // Update existing plan in place — keep same ID, update days and name
      updated=plans.map(p=>{
        if(p.id===editPlanId) return {...p,name:planName||p.name,days:bDays};
        return p;
      });
    } else {
      // New plan — deactivate current, create new
      updated=plans.map(p=>{const a=p.activations||[];if(a.length&&a[a.length-1].to===null)return{...p,activations:[...a.slice(0,-1),{from:a[a.length-1].from,to:start}]};return p;});
      updated=[...updated,{id:`plan_${Date.now()}`,name:planName||"New Plan",createdAt:start,activations:[{from:start,to:null}],days:bDays}];
    }
    const ok=await save(K.plans,updated);
    if(ok){setPlans(updated);setBDays(emptyDays());setPlanName("");setEditPlanId(null);setPlanStart(todayStr());setTab("plans");if(!editPlanId&&onPlanChange)onPlanChange();}
  };
  const loadPlanToEdit=(p)=>{setEditPlanId(p.id);setPlanName(p.name);setPlanStart((p.activations||[]).slice(-1)[0]?.from||todayStr());const nd={...emptyDays()};
    Object.entries(p.days||{}).forEach(([day,d])=>{if(nd[day]){nd[day]={label:d.label||"",supersets:[...(d.supersets||[]).map(ss=>({...ss,exercises:ss.exercises.map(ex=>({...ex}))}))]};}});
    setBDays(nd);setTab("newplan");};
  const clonePlan=(p)=>{setEditPlanId(null);setPlanName(p.name+" (copy)");setPlanStart(todayStr());const nd={...emptyDays()};
    Object.entries(p.days||{}).forEach(([day,d])=>{if(nd[day]){nd[day]={label:d.label||"",supersets:[...(d.supersets||[]).map(ss=>({...ss,id:`ss_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,exercises:ss.exercises.map(ex=>({...ex,id:`${day}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`}))}))]};}});
    setBDays(nd);setTab("newplan");};
  const hasDays=Object.values(bDays).some(d=>d.supersets.length>0);
  return(<div>
    <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap",position:"sticky",top:56,zIndex:50,background:"rgba(245,241,236,0.92)",backdropFilter:"blur(8px)",padding:"8px 0"}}>
      {[["manual","Manual"],["dev","Dev Notes"],["exercises","Exercises"],["plans","Plans"],["newplan","+ New Plan"],["profile","Profile"],["export","Export"],["mobility","Mobility"]].map(([v,l])=>(<button key={v} onClick={()=>{setTab(v);if(v==="newplan"){setEditPlanId(null);setPlanStart(todayStr());}}} style={sty.tab(tab===v)}>{l}</button>))}</div>
    {tab==="plans"&&<div>{[...plans].reverse().map(p=>{const acts=p.activations||[];const isA=acts.length&&acts[acts.length-1].to===null;const isExp=isA||expPlan===p.id;
      return(<div key={p.id} style={{...sty.card,border:`2px solid ${isA?C.green:C.border}`}}>

        <div style={{fontSize:11,color:C.textDim,fontFamily:SANS}}>{Object.entries(p.days||{}).filter(([,d])=>d.supersets?.length).map(([day,d])=>(<span key={day} style={{marginRight:8}}><b style={{color:C.textMid}}>{day}</b> {d.label}</span>))}</div></>}
      </div>);})}</div>}
    {tab==="newplan"&&(<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={sty.card}>

// ─── RESTORE ────────────────────────────────────────────────────────────────
function RestoreModal({onClose,onDone}) {const [text,setText]=useState("");const [ss,setSs]=useState("");const [busy,setBusy]=useState(false);const fileRef=useRef(null);const [showPaste,setShowPaste]=useState(false);
  const doRestore=async(raw)=>{if(!raw||busy)return;setBusy(true);try{
    const {count,errors}=await restoreBackup(raw);
    if(errors>0) setSs(`⚠ Restored ${count}, ${errors} failed`);
    else setSs(`✓ Restored ${count} keys`);
    setTimeout(()=>{onDone();onClose();},1500);
  }catch(e){setSs("✗ Invalid JSON");} finally{setBusy(false);}};
  const doFile=(e)=>{const f=e.target.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{doRestore(rd.result);};rd.readAsText(f);};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:C.card,borderRadius:16,padding:20,width:"100%",maxWidth:520,display:"flex",flexDirection:"column",gap:12,border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:14,color:C.text,fontFamily:SANS}}>Restore</span><span onClick={onClose} style={{cursor:"pointer",color:C.textDim,fontSize:18}}>✕</span></div>
      <button onClick={()=>fileRef.current?.click()} disabled={busy} style={{...sty.btn(C.blue),width:"100%",padding:"14px 0",fontSize:15}}>📁 Choose backup file</button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={doFile}/>
      <div onClick={()=>setShowPaste(!showPaste)} style={{fontSize:11,color:C.textDim,fontFamily:SANS,textAlign:"center",cursor:"pointer"}}>{showPaste?"▲ Hide paste":"▼ Or paste JSON"}</div>
      {showPaste&&<><textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Paste backup JSON…" style={{minHeight:120,fontFamily:MONO,fontSize:9,border:`1px solid ${C.border}`,borderRadius:8,padding:10,color:C.text,background:C.cardAlt,outline:"none",resize:"none"}}/>
      <button onClick={()=>doRestore(text)} disabled={!text.trim()||busy} style={sty.btn(C.red)}>{busy?"…":"Restore from paste"}</button></>}
      {ss&&<div style={{fontSize:12,color:ss.startsWith("✓")?C.green:ss.startsWith("⚠")?C.amber:C.red,fontFamily:SANS}}>{ss}</div>}
      <button onClick={onClose} style={sty.btn(C.surface)}>Cancel</button>
    </div></div>);
}

// ─── ROOT ───────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]=useState("home");const [health,setHealth]=useState([]);const [gym,setGym]=useState({});

  const [loaded,setLoaded]=useState(false);const [showR,setShowR]=useState(false);
  const [exReg,setExReg]=useState({});

    Promise.all([load(K.health),load(K.log),load(K.meta),load(K.plans),load(K.exRegistry)]).then(async([h,g,m,p,reg])=>{
      const empty=!h?.length&&!g;
      if(empty&&SEED_PLANS){p=SEED_PLANS;
        await save(K.plans,p);
      }
      if(h?.length)setHealth(h);if(g&&Object.keys(g).length)setGym(g);
      if(m){setMesoWeek(m.mesoWeek??0);setMesoStart(m.mesoStart??todayStr());setMesoCycle(m.mesoCycle??1);}
      if(p?.length)setPlans(p);
      const builtReg=buildRegistry(reg||{},p||[DEFAULT_PLAN],g||{});
      setExReg(builtReg);save(K.exRegistry,builtReg);
    }).finally(()=>{setLoaded(true);try{const seen=localStorage.getItem("rh-seen-ver");if(seen!==VER){setShowWelcome(true);setShowSettingsDot(true);localStorage.setItem("rh-seen-ver",VER);}}catch{}});},[]);
  const activePlan=plans.find(p=>{const a=p.activations||[];return a.length&&a[a.length-1].to===null;})||DEFAULT_PLAN;
  const idMap=useMemo(()=>buildIdMap(plans,gym),[plans,gym]);
  const saveHCb=useCallback((nl,statusFn)=>{optimisticSave(K.health,nl,setHealth,statusFn);},[]);
  const [backupJson,setBackupJson]=useState(null);const [backupCopied,setBackupCopied]=useState(false);const [backupBusy,setBackupBusy]=useState(false);
  const downloadBackup=useCallback(async()=>{
    if(backupBusy)return;setBackupBusy(true);
    try{
      const data=await buildBackup();
      if(!Object.keys(data).length&&hasLocalStorage){
        for(const[prop,sk] of Object.entries(K)){try{const v=localStorage.getItem(sk);if(v)data[prop]=JSON.parse(v);}catch{}}
      }
      setBackupJson(JSON.stringify(data));
    }catch{setSaveError("Backup failed");}finally{setBackupBusy(false);}
  },[backupBusy]);
  const downloadFile=useCallback(async()=>{
    try{
      const data=await buildBackup();
      if(!Object.keys(data).length&&hasLocalStorage){
        for(const[prop,sk] of Object.entries(K)){try{const v=localStorage.getItem(sk);if(v)data[prop]=JSON.parse(v);}catch{}}
      }
      const json=JSON.stringify(data);
      const blob=new Blob([json],{type:"application/json"});const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`claudefit-${todayStr()}.json`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    }catch(e){setSaveError("Download failed: "+e.message);}
  },[]);
  const chatDump=useCallback(()=>{
    const cut=new Date();cut.setDate(cut.getDate()-7);
    const lines=[];
    // Health
    health.filter(e=>new Date(e.date)>=cut).sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
      let l=`${e.date}`;if(e.weight)l+=` BW:${e.weight}kg`;if(e.calories)l+=` ${e.calories}kcal P:${e.protein||0}g`;
      if(e.mood)l+=` Mood:${e.mood}/5`;if(e.readiness)l+=` Ready:${e.readiness}/5`;if(e.restHR)l+=` rHR:${e.restHR}`;
      if(e.z2)l+=` Z2:${e.z2}min`;lines.push(l);
    });
    lines.push("---");
    // Gym
    Object.entries(gym).filter(([d])=>new Date(d)>=cut).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([d,e])=>{
      const p=[`${d} (${e.day||"?"}) C${e.mesoCycle||"?"} M${e.mesoWeek??0}/3`];
      if(e.bodyWeight)p.push(`BW:${e.bodyWeight}kg`);if(e.feel)p.push(`Feel:${e.feel}`);
      Object.entries(e.sets||{}).forEach(([id,arr])=>{const done=arr.filter(s=>s.done);const name=resolveExName(id,e,idMap||{});
        if(done.length)p.push(`${name}: ${done.map(s=>s.avgWatts?`${s.avgWatts}W/${s.duration||"?"}min HR:${s.avgHR||"?"}`:`${s.weight||"?"}kg×${s.reps||"?"}`).join(", ")}`);});
      if(e.exFeel){const ef=Object.entries(e.exFeel).filter(([,v])=>v);if(ef.length)p.push(`ExFeel: ${ef.map(([id,v])=>`${resolveExName(id,e,idMap||{})}=${v}`).join(", ")}`);}
      if(e.notes)p.push(`Notes: ${e.notes}`);if(e.z2Ride)p.push(`Z2: ${e.z2Ride.duration}min ${e.z2Ride.avgW||"?"}W HR${e.z2Ride.avgHR||"?"} EF${e.z2Ride.ef||"?"}`);
      lines.push(p.join(" | "));
    });
    const text=lines.join("\n");
    navigator.clipboard.writeText(text).catch(()=>{});
    setSaveError("📋 7-day dump copied to clipboard");
  },[health,gym,idMap]);
  if(!loaded)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,color:C.textDim,fontFamily:SANS,fontSize:13}}>Loading…</div>);
  const nav=[{k:"home",i:"🏠"},{k:"gym",i:"🏋️"},{k:"food",i:"🍽️"},{k:"progress",i:"⏱️"},{k:"settings",i:"⚙️"}];
  const edgeBtn=(side,onClick)=><div onClick={onClick} style={{position:"fixed",[side]:0,top:0,bottom:0,width:16,zIndex:90,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"rgba(26,26,26,0.04)",borderRadius:side==="left"?"0 8px 8px 0":"8px 0 0 8px"}}><span style={{fontSize:10,color:C.textDim,fontWeight:700,opacity:0.35}}>{side==="left"?"‹":"›"}</span></div>;
  return(<div style={{minHeight:"100vh",background:C.bg,fontFamily:SANS}}>
    {saveError&&<div onClick={()=>setSaveError(null)} style={{position:"fixed",top:46,left:0,right:0,zIndex:300,display:"flex",justifyContent:"center",padding:"0 16px",pointerEvents:"none"}}>
      <div style={{background:C.red,color:"#fff",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,fontFamily:SANS,boxShadow:"0 4px 16px rgba(200,53,46,0.3)",pointerEvents:"auto",cursor:"pointer",maxWidth:400,textAlign:"center"}}>{saveError} — tap to dismiss</div>
    </div>}
    {restEnd!=null&&restLeft!=null&&(<div onClick={()=>{setRestEnd(null);setRestLeft(null);}} style={{position:"fixed",bottom:24,right:16,zIndex:200,background:restLeft>0?C.red:C.green,borderRadius:16,padding:"12px 20px",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
      <div style={{fontSize:24,fontWeight:800,fontFamily:MONO,color:"#fff"}}>{restLeft>0?`${pad(Math.floor(restLeft/60))}:${pad(restLeft%60)}`:"GO!"}</div>
      <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",fontFamily:SANS}}>{restLeft>0?"REST":"TAP TO DISMISS"}</div>
    </div>)}
    {!showLeftBar&&edgeBtn("left",()=>setShowLeftBar(true))}
    {!showSidebar&&edgeBtn("right",()=>setShowSidebar(true))}
    {showR&&<RestoreModal onClose={()=>setShowR(false)} onDone={()=>window.location.reload()}/>}
    {showWelcome&&<div onClick={()=>setShowWelcome(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:16,padding:24,width:"100%",maxWidth:360,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:18,fontWeight:700,color:C.text,fontFamily:SANS,marginBottom:8}}>Welcome to ClaudeFit v{VER}</div>
        <div style={{fontSize:13,color:C.textMid,fontFamily:SANS,lineHeight:1.6,marginBottom:12}}>Start in <b>Settings → Profile</b> to set your name, targets, and API key. Check the README for a full walkthrough.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <a href="https://richardmcdowall-glitch.github.io/ClaudeFit/README.html" target="_blank" rel="noopener" style={{padding:"6px 14px",borderRadius:8,background:C.accent,color:C.dark,fontWeight:600,fontSize:11,textDecoration:"none",fontFamily:SANS}}>📖 README</a>
          <button onClick={()=>{setShowWelcome(false);setScreen("settings");}} style={sty.btn(C.green,true)}>⚙️ Go to Profile</button>
          <button onClick={()=>setShowWelcome(false)} style={sty.btn(C.surface,true)}>Dismiss</button>

        setScreen(target);
        if(target==="gym") setTimeout(()=>{window.dispatchEvent(new CustomEvent("claudefit-goto-date",{detail:ds}));},100);
        else if(target==="food") setTimeout(()=>{window.dispatchEvent(new CustomEvent("claudefit-goto-food",{detail:ds}));},100);
      };
      return(<div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:0,right:0,bottom:0,width:72,zIndex:250,background:C.dark,boxShadow:"-4px 0 24px rgba(0,0,0,0.4)",overflow:"auto",padding:"8px 4px",display:"flex",flexDirection:"column",gap:2}}>
        <div style={{textAlign:"center",padding:"4px 0 4px",fontSize:9,fontWeight:700,color:C.yellow,fontFamily:MONO}}>C{mesoCycle} {mesoWeek}/3</div>
        {days.map(ds=>{
          const he=health.find(e=>e.date===ds);
          const ge=gym[ds];
          const pd=DAYS[new Date(ds+"T12:00:00").getDay()];
          const cal=he?.calories?parseInt(he.calories):0;
          const calColor=cal>=(profile?.calFloor||1800)&&cal<=(profile?.calCeil||2000)?C.green:cal>(profile?.calCeil||2000)?C.red:cal>0?C.blue:"transparent";
          const hasSets=ge&&Object.values(ge.sets||{}).some(a=>a.some(s=>s.done));
          const hasSpin=ge&&Object.entries(ge.sets||{}).some(([,a])=>a.some(s=>s.avgWatts&&Number(s.avgWatts)>0));
          const hasZ2=!!ge?.z2Ride;
          const hasMob=!!ge?.mobility;
          const feel=ge?.feel;
          const hr=he?.restHR;
          const isToday=ds===todayStr();
          return(<div key={ds} onClick={()=>goDate(ds)} style={{background:isToday?"rgba(245,197,24,0.15)":"rgba(255,255,255,0.04)",borderRadius:6,padding:"3px 2px",textAlign:"center",border:isToday?`1px solid ${C.yellow}`:"1px solid transparent",cursor:"pointer"}}>
            <div style={{fontSize:8,fontWeight:700,color:isToday?C.yellow:"rgba(255,255,255,0.4)",fontFamily:MONO}}>{pd} {ds.slice(8)}.{ds.slice(5,7)}</div>
            {cal>0&&<div style={{fontSize:8,color:calColor,fontFamily:MONO,fontWeight:700}}>{cal}kcal</div>}
            <div style={{display:"flex",justifyContent:"center",gap:1,flexWrap:"wrap"}}>
              {hasSets&&<span style={{fontSize:7}}>🏋️</span>}
              {hasSpin&&<span style={{fontSize:7}}>🚴</span>}
              {hasZ2&&<span style={{fontSize:7}}>🚴</span>}
              {hasMob&&<span style={{fontSize:7}}>🧘</span>}
              {feel&&hasSets&&<span style={{fontSize:7}}>{feelMap[feel]||""}</span>}
            </div>
            {hr&&<div style={{fontSize:7,color:C.red,fontFamily:MONO}}>❤️{hr}</div>}
          </div>);
        })}
      </div>);
    })()}
    {showLeftBar&&(()=>{
      const days=[];const now=new Date();now.setHours(0,0,0,0);
      for(let i=20;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);days.push(localDate(d));}
      const goDate=(ds)=>{
        const cycle=["gym","food","home"];
        const cur=tapCycle[ds]||0;
        const target=cycle[cur%cycle.length];
        setTapCycle(p=>({...p,[ds]:(cur+1)%cycle.length}));
        setScreen(target);
        if(target==="gym") setTimeout(()=>{window.dispatchEvent(new CustomEvent("claudefit-goto-date",{detail:ds}));},100);
        else if(target==="food") setTimeout(()=>{window.dispatchEvent(new CustomEvent("claudefit-goto-food",{detail:ds}));},100);
      };
      const latBW=health.slice().reverse().find(e=>e.weight)?.weight||85;
      return(<div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,bottom:0,width:78,zIndex:250,background:C.dark,boxShadow:"4px 0 24px rgba(0,0,0,0.4)",overflow:"auto",padding:"8px 4px",display:"flex",flexDirection:"column",gap:2}}>
        <div style={{textAlign:"center",padding:"4px 0 4px",fontSize:9,fontWeight:700,color:C.teal,fontFamily:MONO}}>🚴 Bike</div>
        {days.map(ds=>{
          const he=health.find(e=>e.date===ds);
          const ge=gym[ds];
          const pd=DAYS[new Date(ds+"T12:00:00").getDay()];
          const isToday=ds===todayStr();
          const hr=he?.restHR;
          const spinData=ge?Object.entries(ge.sets||{}).flatMap(([,a])=>a.filter(s=>s.avgWatts&&Number(s.avgWatts)>0)):[];
          const hasZ2=!!ge?.z2Ride;
          const z2Ef=ge?.z2Ride?.ef||null;
          const z2W=ge?.z2Ride?.avgW||null;
          const z2Dur=ge?.z2Ride?.duration||null;
          const spinW=spinData.length?Math.round(spinData.reduce((s,r)=>s+Number(r.avgWatts),0)/spinData.length):null;
          const spinHR=spinData.length?Math.round(spinData.reduce((s,r)=>s+(Number(r.avgHR)||0),0)/spinData.length):null;
          const spinEf=spinW&&spinHR?(spinW/spinHR).toFixed(2):null;
          const bw=ge?.bodyWeight||Number(latBW);
          const spinWpk=spinW&&bw?(spinW/bw).toFixed(2):null;
          const hasBikeData=spinData.length||hasZ2;
          if(!hasBikeData&&!hr) return(<div key={ds} onClick={()=>goDate(ds)} style={{background:"rgba(255,255,255,0.02)",borderRadius:6,padding:"3px 2px",textAlign:"center",cursor:"pointer",opacity:0.4}}>
            <div style={{fontSize:8,fontWeight:700,color:isToday?C.yellow:"rgba(255,255,255,0.3)",fontFamily:MONO}}>{pd} {ds.slice(8)}</div>
          </div>);
          return(<div key={ds} onClick={()=>goDate(ds)} style={{background:isToday?"rgba(245,197,24,0.15)":"rgba(255,255,255,0.04)",borderRadius:6,padding:"3px 2px",textAlign:"center",border:isToday?`1px solid ${C.yellow}`:"1px solid transparent",cursor:"pointer"}}>
            <div style={{fontSize:8,fontWeight:700,color:isToday?C.yellow:"rgba(255,255,255,0.4)",fontFamily:MONO}}>{pd} {ds.slice(8)}</div>
            {spinW&&<div style={{fontSize:8,color:C.amber,fontFamily:MONO,fontWeight:700}}>{spinW}W</div>}
            {spinWpk&&<div style={{fontSize:7,color:C.amber,fontFamily:MONO}}>{spinWpk}W/kg</div>}
            {spinEf&&<div style={{fontSize:7,color:C.amber,fontFamily:MONO}}>EF {spinEf}</div>}
            {hasZ2&&<div style={{fontSize:7,color:C.blue,fontFamily:MONO}}>{z2Dur?`Z2 ${z2Dur}m`:""}{z2W?` ${z2W}W`:""}</div>}
            {z2Ef&&<div style={{fontSize:7,color:C.blue,fontFamily:MONO}}>EF {z2Ef}</div>}
            {hr&&<div style={{fontSize:7,color:C.red,fontFamily:MONO}}>❤️{hr}</div>}
          </div>);
        })}
      </div>);
    })()}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
