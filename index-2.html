const TIMEOUT=5000;
const hasClaudeStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';

// In-memory fallback when all persistent storage is blocked
const _memStore={};
function memGet(k){ return _memStore[k]||null; }
function memSet(k,v){ _memStore[k]=v; }

// Test localStorage availability (some sandboxes block it)
let hasLocalStorage=false;
try { localStorage.setItem('_test','1'); localStorage.removeItem('_test'); hasLocalStorage=true; } catch{}

async function load(k) {
  if(hasClaudeStorage) {
    try { const r=await Promise.race([window.storage.get(k),new Promise((_,j)=>setTimeout(()=>j("timeout"),TIMEOUT))]); if(r) return JSON.parse(r.value); } catch{}
  }
  if(hasLocalStorage) {
    try { const v=localStorage.getItem(k); if(v) return JSON.parse(v); } catch{}
  }
  return memGet(k);
}

async function save(k,v) {
  const json=JSON.stringify(v);
  memSet(k,JSON.parse(json));
  // Fire persistent writes in parallel, don't wait for both
  const writes=[];
  if(hasClaudeStorage) writes.push(Promise.race([window.storage.set(k,json),new Promise((_,j)=>setTimeout(()=>j("timeout"),TIMEOUT))]).catch(()=>false));
  if(hasLocalStorage) writes.push(new Promise(r=>{try{localStorage.setItem(k,json);r(true);}catch{r(false);}}));
  if(!writes.length) return true; // memory-only mode
  const results=await Promise.all(writes);
  return results.some(r=>r!==false);
}

// Global save-error callback — set by App root, called by any failed save
let _onSaveError=null;
const setSaveErrorHandler=(fn)=>{_onSaveError=fn;};

// Optimistic save: update state first, persist async, report errors globally
function optimisticSave(k, data, setStateFn, statusFn) {
  if(setStateFn) setStateFn(data);
  save(k,data).then(ok=>{
    if(!ok){ _onSaveError?.(`Save failed: ${k}`); statusFn?.("error"); }
    else statusFn?.("saved");
  }).catch(()=>{ _onSaveError?.(`Save failed: ${k}`); statusFn?.("error"); });
}

// Build complete backup from ALL storage keys
async function buildBackup() {
  const data={};
  for(const[prop,storageKey] of Object.entries(K)) {
    // Try localStorage first (fast, works everywhere)
    if(hasLocalStorage){try{const v=localStorage.getItem(storageKey);if(v){data[prop]=JSON.parse(v);continue;}}catch{}}
    // Fall back to window.storage
    if(hasClaudeStorage){try{const r=await Promise.race([window.storage.get(storageKey),new Promise((_,j)=>setTimeout(()=>j("timeout"),TIMEOUT))]);if(r){data[prop]=JSON.parse(r.value);continue;}}catch{}}
    const m=memGet(storageKey);if(m)data[prop]=m;
  }
  return data;
}

// Restore from backup — maps backup property names to storage keys
async function restoreBackup(raw) {
  const data=JSON.parse(raw);
  let count=0, errors=0;
  for(const[prop,storageKey] of Object.entries(K)) {
    if(data[prop]!=null) {
      const ok=await save(storageKey,data[prop]);
      if(ok) count++; else errors++;
    }
  }
  return {count,errors};
}

// ─── EXERCISE REGISTRY ──────────────────────────────────────────────────────
const normName=n=>n.trim().toLowerCase();
function buildRegistry(existing, plans, gym) {
  const reg={...(existing||{})};
  (plans||[]).forEach(p=>Object.values(p.days||{}).forEach(d=>(d.supersets||[]).forEach(ss=>ss.exercises.forEach(ex=>{
    const key=normName(ex.name);
    if(!reg[key]) reg[key]={name:ex.name,muscles:null,unit:ex.unit||"kg",trackWatts:!!ex.trackWatts,trackGrip:!!ex.trackGrip};
    reg[key].unit=ex.unit||reg[key].unit;
    if(ex.trackWatts) reg[key].trackWatts=true;
    if(ex.trackGrip) reg[key].trackGrip=true;
    if(!reg[key].muscles){const m=detectMuscle(ex.name);if(m)reg[key].muscles=Array.isArray(m)?m:[m];}
  }))));
  Object.values(gym||{}).forEach(entry=>{
    Object.entries(entry.exSwaps||{}).forEach(([,name])=>{
      const key=normName(name);
      if(!reg[key]){const m=detectMuscle(name);reg[key]={name,muscles:m?Array.isArray(m)?m:[m]:null,unit:"kg",trackWatts:false,trackGrip:false};}
    });
    Object.entries(entry.sets||{}).forEach(([id,arr])=>{
      const done=arr.filter(s=>s.done&&s.weight);
      if(done.length){const w=Math.max(...done.map(s=>Number(s.weight)||0));
        const swapName=entry.exSwaps?.[id];
        if(swapName){const key=normName(swapName);if(reg[key])reg[key].lastWeight=Math.max(reg[key].lastWeight||0,w);}
      }
    });
  });
  return reg;
}
function buildIdMap(plans, gym) {
  const m={};(plans||[]).forEach(p=>Object.values(p.days||{}).forEach(d=>(d.supersets||[]).forEach(ss=>ss.exercises.forEach(e=>{m[e.id]=e.name;}))));
  Object.values(gym||{}).forEach(entry=>{Object.entries(entry.exSwaps||{}).forEach(([id,name])=>{if(!m[id])m[id]=name;});});
  return m;
}
function resolveExName(id, entry, idMap) {
  const name=entry?.exSwaps?.[id]||idMap[id];
  if(name) return name;
  // Try to humanise slugified IDs (e.g. "hack-squat-tue" → "Hack Squat")
  const cleaned=id.replace(/[-_](mon|tue|wed|thu|fri|sat|sun)$/i,"").replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase()).trim();
  return cleaned||id;
}
function resolveExMuscle(name, registry) {
  const key=normName(name);
  if(registry[key]?.muscles) return registry[key].muscles;
  const m=detectMuscle(name);return m?Array.isArray(m)?m:[m]:null;
}

function getWeight(gymLog,healthLog) {
  const hw=[...(healthLog||[])].reverse().find(e=>e.weight);
  if(hw) return Number(hw.weight);
  for(const[,e]of Object.entries(gymLog||{}).sort((a,b)=>b[0].localeCompare(a[0]))) if(e.bodyWeight) return Number(e.bodyWeight);
  return 85.3;
}
function initSets(routine,dayKey,mesoWeek,gymLog) {
  const day=routine[dayKey]; if(!day) return {};
  const last=Object.entries(gymLog).filter(([,e])=>e.day===dayKey).sort((a,b)=>b[0].localeCompare(a[0]))[0]?.[1];
  const init={};
  day.supersets.forEach(ss=>ss.exercises.forEach(ex=>{
    const adj=applyMeso(ex,mesoWeek);
    const lw=last?.sets?.[ex.id]?.find(s=>s.weight)?.weight||adj.weight;
    init[ex.id]=Array.from({length:adj.sets},()=>({weight:String(lw||""),reps:"",done:false,avgWatts:"",avgHR:"",km:"",duration:""}));
  }));
  return init;
}

// ─── CROSS-CYCLE WEIGHT SUGGESTIONS ────────────────────────────────────────
function getWeightSuggestions(gymLog, plan, currentCycle) {
  if(currentCycle<2) return {};
  const suggestions={};
  const accumEntries=Object.entries(gymLog).filter(([,e])=>e.mesoWeek===2&&e.planId===plan?.id)
    .sort((a,b)=>b[0].localeCompare(a[0]));
  if(!accumEntries.length) return {};
  const exInfo={};
  Object.values(plan?.days||{}).forEach(d=>(d.supersets||[]).forEach(ss=>ss.exercises.forEach(e=>{
    exInfo[e.id]={name:e.name,reps:e.reps,unit:e.unit,baseWeight:e.baseWeight,trackWatts:e.trackWatts};
  })));
  Object.keys(exInfo).forEach(exId=>{
    const info=exInfo[exId];if(info.trackWatts) return;
    const entry=accumEntries.find(([,e])=>e.sets?.[exId]);if(!entry) return;
    const sets=entry[1].sets[exId]||[];const doneSets=sets.filter(s=>s.done);if(!doneSets.length) return;
    const maxWeight=Math.max(...doneSets.map(s=>Number(s.weight)||0));
    const repParts=String(info.reps).match(/(\d+)\s*[-–]\s*(\d+)/);
    const topRep=repParts?parseInt(repParts[2]):parseInt(info.reps)||12;
    const allHitTop=doneSets.every(s=>(parseInt(s.reps)||0)>=topRep);
    const increment=info.unit==="kg"?(maxWeight>=20?2.5:1):0;
    if(allHitTop&&increment>0) suggestions[exId]={current:maxWeight,suggested:maxWeight+increment,reason:"owned",name:info.name};
    else suggestions[exId]={current:maxWeight,suggested:maxWeight,reason:"repeat",name:info.name};
  });
  return suggestions;
}

// ─── MEAL PARSING ───────────────────────────────────────────────────────────
function parseMeals(text) {
  return text.split("\n").map(l=>l.trim()).filter(l=>l.startsWith("MEAL|")).map(line=>{
    const p=line.split("|"); const date=p[1]||todayStr(),time=p[2]||"",name=p[3]||"Meal";
    if(p.length>=8&&!String(p[4]).includes(":")) return{date,time,name,calories:+p[4]||0,protein_g:+p[5]||0,carbs_g:+p[6]||0,fat_g:+p[7]||0,description:p.slice(8).join("|").trim()};
    const f={}; let di=-1;
    for(let i=4;i<p.length;i++){if(!p[i].match(/^\w+:\d/)){di=i;break;}const[k,v]=p[i].split(":");f[k.trim()]=+v||0;}

async function askClaude(apiKey, prompt, maxTokens=600, imageData) {
  if(!apiKey) return "No API key set. Add your Claude API key in Settings → Profile.";
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),15000);
  try {
    const content=imageData?[{type:"image",source:{type:"base64",media_type:imageData.type||"image/jpeg",data:imageData.data}},{type:"text",text:prompt}]:prompt;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",signal:controller.signal,
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content}]})});
    clearTimeout(timer);
    if(!r.ok){const e=await r.json().catch(()=>({}));return `API error: ${e.error?.message||r.status}`;}
    const d=await r.json();return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  } catch(e){clearTimeout(timer);return e.name==="AbortError"?"Request timed out (15s). Try again.":"Connection error.";}
}

function parseZ2Ride(text) {

  const p=line.split("|");const date=p[1]||todayStr();const durParts=(p[2]||"0:00").split(":");

  const fields={};for(let i=3;i<p.length;i++){const m=p[i].match(/^(\w+):(.*)$/);if(m&&m[2])fields[m[1]]=m[2];}

function useChartTouch(ref,dataLen) {
  const [idx,setIdx]=useState(null);
  const calc=useCallback((e)=>{if(!ref.current||!dataLen)return;const r=ref.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;const pct=(cx-r.left)/r.width;
    const i=Math.max(0,Math.min(dataLen-1,Math.round(pct*(dataLen-1))));setIdx(i);},[ref,dataLen]);
  const handlers=useMemo(()=>({
    onTouchStart(e){e.preventDefault();calc(e);},onTouchMove(e){e.preventDefault();calc(e);},onTouchEnd(){setIdx(null);},
    onMouseDown(e){calc(e);},onMouseMove(e){if(e.buttons)calc(e);},onMouseUp(){setIdx(null);},onMouseLeave(){setIdx(null);}
  }),[calc]);
  return[idx,handlers];
}

        {data.map((d,i)=>{const h=((d.v-min)/range)*H,x=gap+(bw+gap)*i,y=tM+H-h,c=typeof barColor==="function"?barColor(d,i):barColor,sel=idx===i;return(

                      {{"more":"➕","growth":"💪","ok":"💚","twinge":"⚠️","pain":"🔴","less":"➖"}[exFeel?.[ex.id]]||"◽"}</span>}
                  </div>
                </>)}
              </div>
              {noteOpen===ex.id&&onExNote&&<div style={{marginTop:4,marginBottom:2}}>
                <input value={exNotes?.[ex.id]||""} onChange={e=>onExNote(ex.id,e.target.value)} placeholder="Note…"

              </div>}

                {onChange&&!ex.trackWatts&&sets[ex.id]?.length>1&&sets[ex.id][0]?.weight&&<span onClick={()=>{const f=sets[ex.id][0];sets[ex.id].forEach((_,j)=>{if(j>0){onChange(ex.id,j,"weight",f.weight);if(f.reps)onChange(ex.id,j,"reps",f.reps);}});}} style={{fontSize:10,color:C.blue,cursor:"pointer",fontFamily:SANS}}>⇊</span>}
                <span style={{fontSize:10,color:C.textDim,fontFamily:MONO}}>{ex.baseSets}×{ex.reps}</span>
              </div>
            </div>))}          <div/>
        </div>
        {Array.from({length:numS},(_,i)=>{
          const rowDone=ss.exercises.every(ex=>sets[ex.id]?.[i]?.done);
          return(
            <div key={i} style={{display:"grid",gridTemplateColumns:isSS?"1fr 1fr auto":"1fr auto",padding:"5px 12px",borderBottom:`1px solid ${C.borderLight}`,background:rowDone?C.yellowDim:"transparent",alignItems:"center"}}>
              {ss.exercises.map(ex=>{const s=sets[ex.id]?.[i]||{};return(
                <div key={ex.id} style={{paddingRight:6}}>

                    <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>

                        <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                          <span style={{fontSize:8,color:C.textDim,fontFamily:SANS}}>{l}</span>

                    </div>

                      <span style={{fontSize:10,color:C.textDim,fontFamily:MONO,minWidth:10}}>{i+1}</span>
                      <input type="number" value={s.weight||""} onChange={e=>onChange(ex.id,i,"weight",e.target.value)} style={sty.input(46)} placeholder="kg"/>
                      <span style={{fontSize:10,color:C.textDim}}>×</span>
                      <input type="text" value={s.reps||""} onChange={e=>onChange(ex.id,i,"reps",e.target.value)} style={sty.input(46)} placeholder={ex.reps}/>
                      {ex.trackGrip&&<span onClick={()=>onChange(ex.id,i,"grip",s.grip==="W"?"P":s.grip==="P"?"C":"W")}
                        style={{fontSize:10,fontWeight:700,fontFamily:MONO,cursor:"pointer",padding:"4px 7px",borderRadius:6,marginLeft:2,
                          background:s.grip==="W"?C.blue:s.grip==="P"?C.teal:s.grip==="C"?C.purple:C.surface,
                          color:s.grip?"#fff":C.textDim}}>{s.grip||"G"}</span>}
                    </div>)}
                </div>);})}
              <button onClick={()=>onDone(ss,i)} style={{border:"none",background:"none",cursor:"pointer",padding:"0 2px"}}>
                {rowDone?<span style={{fontSize:16}}>✅</span>:<span style={{display:"inline-block",width:20,height:20,borderRadius:"50%",border:`2px solid ${C.red}`}}/>}
              </button>
            </div>);
        })}
        {onAdd&&<div style={{display:"flex",justifyContent:"center",gap:16,padding:"5px 0"}}>{onRemove&&numS>1&&<span onClick={()=>onRemove(ss)} style={{fontSize:11,color:C.red,cursor:"pointer",fontFamily:SANS}}>− set</span>}<span onClick={()=>onAdd(ss)} style={{fontSize:11,color:C.textDim,cursor:"pointer",fontFamily:SANS}}>+ set</span></div>}
      </div>);
  });
}

        {(()=>{const ci={background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"10px 6px",color:"#fff",fontSize:14,fontWeight:700,fontFamily:MONO,outline:"none",textAlign:"center",boxSizing:"border-box",width:"100%",minWidth:0};return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <input type="number" step="0.1" value={wt} onChange={e=>setWt(e.target.value)} placeholder={lw||"85.3"} onKeyDown={e=>e.key==="Enter"&&doSave()} style={ci}/>

        </div>;})()}
        {(()=>{const te=health.find(e=>e.date===todayStr());const tz=Number(te?.z2)||0;return tz>0?<div style={{fontSize:10,color:"rgba(255,255,255,0.5)",fontFamily:MONO,marginBottom:8,textAlign:"right"}}>Z2 today: {tz} min</div>:null;})()}
        {[["Mood",moodEmoji,mood,setMood],["Readiness",readyEmoji,ready,setReady]].map(([l,fn,v,set])=>(
          <div key={l} style={{marginBottom:10}}>

// ─── ANALYSIS ──────────────────────────────────────────────────────────────
function Analysis({gym,health,idMap,exReg,onGoToDate,profile}) {
  const [sliderOffset,setSliderOffset]=useState(0);
  const [selMuscles,setSelMuscles]=useState([]);
  const [mode,setMode]=useState("volume");
  const [tapDay,setTapDay]=useState(null);
  const [mapMuscle,setMapMuscle]=useState(null); // body map selected muscle for detail
  const windowDays=10;
  const windowDates=useMemo(()=>{
    const arr=[];const end=new Date();end.setDate(end.getDate()-sliderOffset);end.setHours(0,0,0,0);
    for(let i=windowDays-1;i>=0;i--){const d=new Date(end);d.setDate(end.getDate()-i);arr.push(localDate(d));}
    return arr;
  },[sliderOffset]);
  const allDates=useMemo(()=>Object.keys(gym).sort(),[gym]);
  const maxOffset=useMemo(()=>{if(!allDates.length)return 30;return Math.ceil((new Date()-new Date(allDates[0]))/864e5);},[allDates]);
  const fmtD=d=>`${d.slice(8)}.${d.slice(5,7)}`;
  const toggleMuscle=m=>setSelMuscles(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);
  // Worst feel for a day: session feel + all exercise feels
  const worstFeel=(entry)=>{
    let w=0;const rank={ok:1,pumped:1,more:1,growth:1,less:1,twinge:2,injury:3,pain:3,sick:2,holiday:0};
    if(entry?.feel)w=Math.max(w,rank[entry.feel]||0);
    if(entry?.exFeel)Object.values(entry.exFeel).forEach(v=>{if(v)w=Math.max(w,rank[v]||0);});
    return w;
  };
  // ─── UNIFIED HEAT MAP: green=good, amber=caution, red=concern ───
  const HEAT={good:"#3a8c5c",caution:"#d4920e",concern:"#c8352e",neutral:C.surface};
  const feelColor=w=>w>=3?HEAT.concern:w>=2?HEAT.caution:w>=1?HEAT.good:HEAT.neutral;
  // Per-day data
  const dayData=useMemo(()=>{
    return windowDates.map(ds=>{
      const ge=gym[ds];const he=health.find(e=>e.date===ds);
      let sets=0;
      if(ge){Object.entries(ge.sets||{}).forEach(([id,arr])=>{
        const nm=resolveExName(id,ge,idMap||{});const mu=resolveExMuscle(nm,exReg||{});
        if(!mu)return;if(selMuscles.length&&!mu.some(m=>selMuscles.includes(m)))return;
        sets+=arr.filter(s=>s.done).length;});
        if(ge.mobility){const mobMu=["glutes","hamstrings","calves","lowerback"];
          if(!selMuscles.length||selMuscles.some(m=>mobMu.includes(m)))sets+=mobMu.filter(m=>!selMuscles.length||selMuscles.includes(m)).length*2;}
        if(ge.z2Ride?.duration&&(!selMuscles.length||selMuscles.includes("cardio")))sets+=Math.max(1,Math.round(ge.z2Ride.duration/30));}
      const wf=worstFeel(ge);
      const cal=he?.calories?parseInt(he.calories):0;
      const rhr=he?.restHR?parseInt(he.restHR):null;
      const mesoPhase=ge?.mesoWeek!=null?ge.mesoWeek:null;
      return{date:ds,sets,wf,cal,rhr,mesoPhase,entry:ge,health:he};
    });
  },[windowDates,gym,health,selMuscles,idMap,exReg]);
  const maxSets=Math.max(1,...dayData.map(d=>d.sets));
  const rhrVals=dayData.filter(d=>d.rhr).map(d=>d.rhr);
  const maxRHR=rhrVals.length?Math.max(...rhrVals):80;
  const minRHR=rhrVals.length?Math.min(...rhrVals):50;
  const rhrRange=maxRHR-minRHR||1;
  const rhrColor=v=>{if(v==null)return HEAT.neutral;const pct=(v-minRHR)/rhrRange;return pct<0.33?HEAT.good:pct<0.66?HEAT.caution:HEAT.concern;};
  const cF=profile.calFloor||1800,cC=profile.calCeil||2000;const calColor=v=>v<=0?HEAT.neutral:v<cF?HEAT.caution:v<=cC?HEAT.good:v<=cC+300?HEAT.caution:HEAT.concern;
  // Body map counts for the window
  const bodyCounts=useMemo(()=>{
    const c={},injuries={};
    const ws=new Date(windowDates[0]),we=new Date(windowDates[windowDates.length-1]);
    Object.entries(gym).forEach(([date,entry])=>{const d=new Date(date);if(d<ws||d>we)return;
      Object.entries(entry.sets||{}).forEach(([id,arr])=>{
        const nm=resolveExName(id,entry,idMap||{});const mu=resolveExMuscle(nm,exReg||{});if(!mu)return;
        const done=arr.filter(s=>s.done).length;const ef=entry.exFeel?.[id];
        mu.forEach(m=>{c[m]=(c[m]||0)+done;
          if(ef==="twinge"||ef==="pain"){injuries[m]=(injuries[m]||0)+1;}});});
      if(entry.mobility){[["glutes",2],["hamstrings",2],["calves",2],["lowerback",2]].forEach(([m,n])=>{c[m]=(c[m]||0)+n;});}
      if(entry.z2Ride?.duration){c["cardio"]=(c["cardio"]||0)+Math.max(1,Math.round(entry.z2Ride.duration/30));}});
    return{c,injuries};
  },[gym,windowDates,idMap,exReg]);
  const injuryColor=n=>!n?HEAT.neutral:n===1?HEAT.caution:n<=3?C.orange:HEAT.concern;
  const activeMuscles=useMemo(()=>Object.keys(MUSCLE_NAMES).filter(m=>(bodyCounts.c[m]||0)>0).sort((a,b)=>(bodyCounts.c[b]||0)-(bodyCounts.c[a]||0)),[bodyCounts]);
  const cardio=useMemo(()=>{let total=0,legMin=0;windowDates.forEach(ds=>{
    const he=health.find(e=>e.date===ds);const ge=gym[ds];
    if(he?.z2)total+=Number(he.z2);
    if(ge?.z2Ride?.duration)total+=Number(ge.z2Ride.duration);
    if(ge?.sets){Object.entries(ge.sets).forEach(([,a])=>{a.forEach(s=>{if(s.avgWatts&&Number(s.avgWatts)>0&&s.duration){const m=Number(s.duration)||0;total+=m;legMin+=m;}});});}
  });return{total,legMin};},[windowDates,gym,health]);
  const gridLine="1px solid rgba(0,0,0,0.05)";
  return(<div>
    {/* Time slider — sticky */}
    <div style={{position:"sticky",top:46,zIndex:50,padding:"6px 0"}}>
      <div style={{background:"rgba(245,241,236,0.88)",backdropFilter:"blur(8px)",borderRadius:12,padding:"8px 12px",border:`1px solid ${C.borderLight}`}}>
        <div style={{textAlign:"center",fontSize:10,color:C.textDim,fontFamily:MONO,marginBottom:4}}>{fmtD(windowDates[0])} — {fmtD(windowDates[windowDates.length-1])}</div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:10,color:C.textDim,fontFamily:MONO}}>←</span>
          <input type="range" min={0} max={maxOffset} value={sliderOffset} onChange={e=>setSliderOffset(Number(e.target.value))}
            style={{flex:1,accentColor:C.yellow,direction:"rtl"}}/>
          <span style={{fontSize:10,color:C.textDim,fontFamily:MONO}}>now</span>
        </div>
      </div>
    </div>
    {/* Muscle toggle chips — all groups always visible */}
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10,padding:"0 2px"}}>
      {Object.keys(MUSCLE_NAMES).map(m=>{const on=selMuscles.includes(m);const hasInj=(bodyCounts.injuries[m]||0)>0;const hasData=(bodyCounts.c[m]||0)>0;
        return(<span key={m} onClick={()=>toggleMuscle(m)} style={{fontSize:10,cursor:"pointer",padding:"4px 10px",borderRadius:12,fontFamily:SANS,fontWeight:600,
          background:on?C.dark:C.card,color:on?"#fff":hasData?C.textMid:C.textDim,border:`1px solid ${hasInj?C.red:on?C.dark:C.border}`,opacity:hasData||on?1:0.45}}>
          {MUSCLE_NAMES[m]}{hasInj&&<span style={{color:on?"#ff6b6b":C.red,marginLeft:3}}>⚠</span>}
        </span>);})}
      {selMuscles.length>0&&<span onClick={()=>setSelMuscles([])} style={{fontSize:10,cursor:"pointer",padding:"4px 10px",borderRadius:12,fontFamily:SANS,color:C.textDim,border:`1px solid ${C.border}`}}>✕ clear</span>}
    </div>
    {/* ─── ALIGNED 10-DAY STRIPS ─── */}
    <div style={sty.card}>
      <div style={{position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",gap:1,pointerEvents:"none",zIndex:0}}>
          {dayData.map((d,i)=><div key={d.date} style={{flex:1,borderLeft:i>0?gridLine:"none"}}/>)}
        </div>
        <div style={{position:"relative",zIndex:1}}>
          {/* Date labels */}
          <div style={{display:"flex",gap:1,marginBottom:3}}>
            {dayData.map(d=><div key={d.date} style={{flex:1,textAlign:"center",fontSize:7,color:C.textDim,fontFamily:MONO}}>{fmtD(d.date)}</div>)}
          </div>
          {/* Sets strip — coloured by worst feel */}
          <div style={{display:"flex",gap:1,height:24,borderRadius:4,overflow:"hidden",marginBottom:1}}>
            {dayData.map((d,i)=>{const pct=maxSets?d.sets/maxSets:0;const bg=d.sets>0?feelColor(d.wf):C.surface;
              return <div key={d.date} onClick={()=>setTapDay(tapDay===i?null:i)} style={{flex:1,background:bg,opacity:Math.max(0.25,pct),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"opacity 0.15s"}}>
                {d.sets>0&&<span style={{fontSize:9,fontWeight:700,color:d.wf>=2?"#fff":C.text,fontFamily:MONO}}>{d.sets}</span>}
              </div>;})}
          </div>
          <div style={{fontSize:7,color:C.textDim,fontFamily:SANS,marginBottom:8}}>Sets{selMuscles.length?` (${selMuscles.map(m=>MUSCLE_NAMES[m]).join(", ")})`:""} · <span style={{color:HEAT.good}}>●</span> ok <span style={{color:HEAT.caution}}>●</span> twinge <span style={{color:HEAT.concern}}>●</span> pain</div>
          {/* Calories strip */}
          <div style={{display:"flex",gap:1,height:18,borderRadius:4,overflow:"hidden",marginBottom:1}}>
            {dayData.map(d=>{const bg=calColor(d.cal);
              return <div key={d.date} style={{flex:1,background:bg,opacity:d.cal>0?0.7:0.15}}/>;})}
          </div>
          <div style={{fontSize:7,color:C.textDim,fontFamily:SANS,marginBottom:8}}>Calories · <span style={{color:HEAT.caution}}>●</span> &lt;1800 <span style={{color:HEAT.good}}>●</span> 1800-2000 <span style={{color:HEAT.concern}}>●</span> &gt;2300</div>
          {/* rHR strip */}
          <div style={{display:"flex",gap:1,height:18,borderRadius:4,overflow:"hidden",marginBottom:1}}>
            {dayData.map(d=>{const bg=rhrColor(d.rhr);
              return <div key={d.date} style={{flex:1,background:bg,opacity:d.rhr?0.7:0.15,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {d.rhr&&<span style={{fontSize:8,fontWeight:700,color:"#fff",fontFamily:MONO}}>{d.rhr}</span>}
              </div>;})}
          </div>
          <div style={{fontSize:7,color:C.textDim,fontFamily:SANS,marginBottom:8}}>rHR · <span style={{color:HEAT.good}}>●</span> low <span style={{color:HEAT.caution}}>●</span> mid <span style={{color:HEAT.concern}}>●</span> high</div>
          {/* Meso phase band */}
          <div style={{display:"flex",gap:1,height:10,borderRadius:3,overflow:"hidden"}}>
            {dayData.map(d=>{const clr=d.mesoPhase!=null?MESO[d.mesoPhase]?.color||C.surface:C.surface;
              return <div key={d.date} style={{flex:1,background:clr,opacity:d.mesoPhase!=null?0.8:0.15}}/>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:3}}>
            {MESO.map((m,i)=>(<span key={i} style={{fontSize:7,color:m.color,fontFamily:MONO}}>● {m.label.split(" ")[0]}</span>))}
          </div>
        </div>
      </div>
      {/* Day tap popup */}
      {tapDay!=null&&(()=>{const d=dayData[tapDay];if(!d)return null;
        const ge=d.entry;const he=d.health;
        return(<div style={{marginTop:8,background:C.cardAlt,borderRadius:8,padding:"8px 10px",border:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:MONO}}>{d.date}</span>
            <span onClick={()=>setTapDay(null)} style={{fontSize:11,color:C.red,cursor:"pointer",fontFamily:SANS}}>✕</span>
          </div>
          {d.sets>0&&<div style={{fontSize:11,color:C.text,fontFamily:SANS}}>{d.sets} sets · feel: {["—","ok","twinge","pain"][d.wf]||"—"}</div>}
          {d.cal>0&&<div style={{fontSize:11,color:calColor(d.cal),fontFamily:MONO}}>{d.cal} kcal</div>}
          {d.rhr&&<div style={{fontSize:11,color:C.text,fontFamily:MONO}}>rHR: {d.rhr}</div>}
          {d.mesoPhase!=null&&<div style={{fontSize:10,color:MESO[d.mesoPhase]?.color,fontFamily:SANS}}>{MESO[d.mesoPhase]?.label}</div>}
          {ge?.feel&&<div style={{fontSize:10,color:C.textMid,fontFamily:SANS}}>Session: {({ok:"💚",pumped:"🔥",twinge:"⚠️",injury:"🔴",sick:"🤢",holiday:"✈️"})[ge.feel]||ge.feel}</div>}
          {ge?.exFeel&&Object.entries(ge.exFeel).filter(([,v])=>v).length>0&&<div style={{fontSize:10,color:C.textMid,fontFamily:SANS}}>Exercises: {Object.entries(ge.exFeel).filter(([,v])=>v).map(([id,v])=>{
            const nm=resolveExName(id,ge,idMap||{});const em=({more:"➕",growth:"💪",ok:"💚",twinge:"⚠️",pain:"🔴",less:"➖"})[v]||v;return`${nm} ${em}`;}).join(", ")}</div>}
          {ge?.notes&&<div style={{fontSize:10,color:C.textDim,fontFamily:SANS,marginTop:2}}>💬 {ge.notes}</div>}
          {he?.mood&&<div style={{fontSize:10,color:C.textDim,fontFamily:SANS}}>Mood: {moodEmoji(he.mood)} Ready: {readyEmoji(he.readiness)}</div>}
        </div>);
      })()}
    </div>
    {/* Body map */}
    <div style={{...sty.card,padding:"8px 10px"}}>
      <div style={{display:"flex",gap:4,marginBottom:6,alignItems:"center",justifyContent:"center"}}>
        {[["volume","Volume"],["injury","Injury"]].map(([k,l])=>(
          <button key={k} onClick={()=>setMode(k)} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:SANS,fontSize:10,fontWeight:600,
            background:mode===k?(k==="volume"?C.green:C.red):"transparent",color:mode===k?"#fff":C.textDim}}>{l}</button>))}
      </div>
      <BodySVG counts={mode==="volume"?bodyCounts.c:Object.fromEntries(Object.keys(MUSCLE_NAMES).map(m=>[m,bodyCounts.injuries[m]||0])) } cardio={cardio}
        onSelect={m=>{toggleMuscle(m);setMapMuscle(mapMuscle===m?null:m);}} selected={mapMuscle} colorFn={mode==="injury"?injuryColor:undefined}/>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:4}}>
        {mode==="volume"?[["#e0dbd5","0"],["#c8352e","<5"],["#e6a817","5-9"],["#3a8c5c","10-14"],["#3b6b9d","15+"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:8,height:8,borderRadius:2,background:c,border:"1px solid rgba(0,0,0,0.1)"}}/>
            <span style={{fontSize:7,color:C.textDim,fontFamily:MONO}}>{l}</span></div>))
        :[["#e0dbd5","0"],[HEAT.caution,"1"],[C.orange,"2-3"],[HEAT.concern,"4+"]].map(([c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:8,height:8,borderRadius:2,background:c,border:"1px solid rgba(0,0,0,0.1)"}}/>
            <span style={{fontSize:7,color:C.textDim,fontFamily:MONO}}>{l}</span></div>))}
      </div>
      {/* Muscle detail — date list */}
      {mapMuscle&&(()=>{
        const entries=[];
        windowDates.forEach(ds=>{const ge=gym[ds];if(!ge)return;
          Object.entries(ge.sets||{}).forEach(([id,arr])=>{
            const nm=resolveExName(id,ge,idMap||{});const mu=resolveExMuscle(nm,exReg||{});
            if(!mu||!mu.includes(mapMuscle))return;
            const done=arr.filter(s=>s.done).length;if(!done)return;
            const ef=ge.exFeel?.[id];const en=ge.exNotes?.[id];
            const feelEm=ef?({more:"➕",growth:"💪",ok:"💚",twinge:"⚠️",pain:"🔴",less:"➖"})[ef]||"":"";
            entries.push({date:ds,name:nm,sets:done,feel:ef,feelEm,note:en,sessionFeel:ge.feel});
          });
        });
        if(!entries.length)return <div style={{marginTop:8,fontSize:11,color:C.textDim,fontFamily:SANS,textAlign:"center"}}>No {MUSCLE_NAMES[mapMuscle]} data in this window.</div>;
        return(<div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:SANS,marginBottom:6}}>{MUSCLE_NAMES[mapMuscle]} — {mode==="injury"?"injury history":"session detail"}</div>
          {entries.map((e,i)=>{
            const isInjury=e.feel==="twinge"||e.feel==="pain";
            if(mode==="injury"&&!isInjury)return null;
            return(<div key={i} onClick={()=>onGoToDate?.(e.date)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${C.borderLight}`,cursor:onGoToDate?"pointer":"default"}}>
              <div style={{flex:1}}>
                <span style={{fontSize:11,fontWeight:700,color:C.text,fontFamily:MONO}}>{fmtD(e.date)}</span>
                <span style={{fontSize:11,color:C.textMid,fontFamily:SANS,marginLeft:6}}>{e.name}</span>
                {e.note&&<div style={{fontSize:10,color:C.textDim,fontStyle:"italic"}}>💬 {e.note}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:C.textDim,fontFamily:MONO}}>{e.sets}s</span>
                {e.feelEm&&<span style={{fontSize:12}}>{e.feelEm}</span>}
              </div>
            </div>);
          }).filter(Boolean)}
          {onGoToDate&&<div style={{fontSize:9,color:C.textDim,fontFamily:SANS,marginTop:4,textAlign:"center"}}>Tap a row to open that session</div>}
        </div>);
      })()}
    </div>
  </div>);
}


function Progress({gym,health,plan,ftp,idMap,exReg,z2Target,profile,onGoToDate}) {
  const wTarget=profile?.weightTarget||PD.weightTarget;const calFloor=profile?.calFloor||PD.calFloor;const calCeil=profile?.calCeil||PD.calCeil;const wpkGoal1=profile?.wpk1||PD.wpk1;const wpkGoal2=profile?.wpk2||PD.wpk2;
  const [chartDays,setChartDays]=useState(30);
  const chartCut=useMemo(()=>{if(chartDays>=9999)return null;const d=new Date();d.setDate(d.getDate()-chartDays);return d;},[chartDays]);
  const filterByRange=(arr)=>chartCut?arr.filter(d=>d.date>=chartCut):arr;
  const bwData=useMemo(()=>{
    const byDate={};
    health.forEach(e=>{if(e.weight)byDate[e.date]=Number(e.weight);});
    Object.entries(gym).forEach(([d,e])=>{if(e.bodyWeight)byDate[d]=Number(e.bodyWeight);});
    return Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>({label:`${d.slice(8)}.${d.slice(5,7)}`,v,date:new Date(d)}));
  },[gym,health]);
  const latBW=getWeight(gym,health);const ftpV=ftp||162;
  const wpkW=useMemo(()=>{
    const wk={};Object.entries(gym).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([d,e])=>{
      const sp=Object.entries(e.sets||{}).flatMap(([,a])=>a.filter(s=>s.avgWatts&&Number(s.avgWatts)>0));
      if(!sp.length)return;const bw=e.bodyWeight||latBW;
      const wpk=sp.reduce((s,r)=>s+Number(r.avgWatts),0)/sp.length/bw;
      const dt=new Date(d),j4=new Date(dt.getFullYear(),0,4);
      const k=`${dt.getFullYear()}-W${pad(Math.ceil(((dt-j4)/86400000+j4.getDay()+1)/7))}`;
      if(!wk[k])wk[k]={s:0,n:0};wk[k].s+=wpk;wk[k].n++;});
    return Object.entries(wk).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,{s,n}])=>({label:k.slice(5),v:parseFloat((s/n).toFixed(3))}));
  },[gym,latBW]);
  const ftpWpk=parseFloat((ftpV/latBW).toFixed(2));
  const calData=health.filter(e=>e.calories).map(e=>({label:`${e.date.slice(8)}.${e.date.slice(5,7)}`,v:parseInt(e.calories),date:new Date(e.date)}));
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[30,10].map(days=>{const cut=new Date();cut.setDate(cut.getDate()-days);
          const logged=Object.entries(gym).filter(([d,e])=>new Date(d)>=cut&&Object.values(e.sets||{}).some(a=>a.some(s=>s.done))).length;
          const planned=Math.round(Object.values(plan?.days||{}).filter(d=>d.supersets?.length).length*days/7);
          const pct=planned?Math.round(logged/planned*100):0;
          return(<div key={days} style={{...sty.card,display:"flex",alignItems:"center",gap:10,marginBottom:0}}>
            <Ring pct={pct} color={pct>=80?C.green:pct>=60?C.amber:C.red}><div style={{fontSize:11,fontWeight:800,color:C.text,fontFamily:MONO}}>{pct}%</div></Ring>
            <div><div style={{fontSize:10,color:C.textDim,fontFamily:SANS}}>{days}-day</div><div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:MONO}}>{logged}<span style={{fontSize:10,color:C.textDim}}>/{planned}</span></div></div>
          </div>);})}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:10,position:"sticky",top:46,zIndex:40,backdropFilter:"blur(8px)",padding:"8px 0",borderRadius:8}}>
        {[7,14,30,9999].map(d=>(<span key={d} onClick={()=>setChartDays(d)} style={{fontSize:10,fontFamily:MONO,cursor:"pointer",padding:"4px 8px",borderRadius:10,
          background:chartDays===d?C.yellow:"transparent",color:chartDays===d?C.dark:C.textDim,fontWeight:chartDays===d?700:400}}>{d===9999?"All":`${d}d`}</span>))}
      </div>
      {bwData.length>0&&(()=>{const fd=filterByRange(bwData);if(!fd.length)return null;const avg7=fd.map((d,i)=>{const w=fd.slice(Math.max(0,i-6),i+1);return{label:d.label,v:parseFloat((w.reduce((s,x)=>s+x.v,0)/w.length).toFixed(1))};});
        return <div style={sty.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS}}>Body weight trend</span><span style={{fontSize:11,color:C.textDim,fontFamily:MONO}}>Target: {wTarget}kg</span></div><LineChart data={fd} color={C.blue} targetLine={wTarget} targetLabel={`${wTarget}kg`} avgData={avg7} avgColor={C.teal}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9,color:C.teal,fontFamily:MONO}}>--- 7d avg: {avg7[avg7.length-1].v}kg</span><span style={{fontSize:11,color:C.textMid,fontFamily:MONO}}>Latest: <b>{fd[fd.length-1].v}kg</b></span></div></div>;})()}
      {calData.length>0&&(()=>{const fd=filterByRange(calData);if(!fd.length)return null;return <div style={sty.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS}}>Calorie intake</span><span style={{fontSize:11,color:C.textDim,fontFamily:MONO}}>{calFloor}-{calCeil}</span></div><BarChart data={fd} refLines={[{value:calFloor,color:C.teal},{value:calCeil,color:C.orange}]} barColor={d=>d.v>=calFloor&&d.v<=calCeil?C.green:d.v<calFloor?C.blue:C.red}/><div style={{fontSize:11,color:C.textMid,textAlign:"right",fontFamily:MONO}}>Latest: <b>{fd[fd.length-1].v}kcal</b></div></div>;})()}
      {wpkW.length>0&&<div style={sty.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS}}>W/kg weekly avg</span><span style={{fontSize:11,color:C.textDim,fontFamily:MONO}}>FTP: {ftpWpk}</span></div><BarChart data={wpkW} targetLine={ftpWpk} targetLabel="FTP" refLines={[{value:wpkGoal1,color:C.green},{value:wpkGoal2,color:C.purple}]} barColor={d=>d.v>=ftpWpk?C.green:C.blue}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:9,color:C.textDim,fontFamily:MONO}}>{wpkGoal1}=Goal 1 · {wpkGoal2}=Goal 2</span><span style={{fontSize:11,color:C.textMid,fontFamily:MONO}}>Latest: <b>{wpkW[wpkW.length-1].v}</b></span></div></div>}
      {(()=>{const wk={};health.filter(e=>e.z2).forEach(e=>{const dt=new Date(e.date),j4=new Date(dt.getFullYear(),0,4);
        const k=`${dt.getFullYear()}-W${pad(Math.ceil(((dt-j4)/86400000+j4.getDay()+1)/7))}`;wk[k]=(wk[k]||0)+Number(e.z2);});
        Object.entries(gym).forEach(([d,e])=>{if(!e.z2Ride?.duration)return;const dt=new Date(d),j4=new Date(dt.getFullYear(),0,4);
          const k=`${dt.getFullYear()}-W${pad(Math.ceil(((dt-j4)/86400000+j4.getDay()+1)/7))}`;wk[k]=(wk[k]||0)+e.z2Ride.duration;});
        const z2W=Object.entries(wk).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({label:k.slice(5),v:Math.round(v)}));
        if(!z2W.length)return null;const tgt=z2Target?Number(z2Target):null;
        return <div style={sty.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS}}>Zone 2 weekly</span><span style={{fontSize:11,color:C.textDim,fontFamily:MONO}}>{tgt?`Target: ${tgt}min`:"min/week"}</span></div>
          <BarChart data={z2W} targetLine={tgt} targetLabel={tgt?`${tgt}`:null} barColor={d=>tgt&&d.v>=tgt?C.green:C.teal}/>
          <div style={{fontSize:11,color:C.textMid,textAlign:"right",fontFamily:MONO}}>Latest: <b>{z2W[z2W.length-1].v} min</b></div></div>;})()}
      {(()=>{
        const z2Ef=[],spinEf=[];
        Object.entries(gym).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([d,e])=>{
          const dl=`${d.slice(8)}.${d.slice(5,7)}`;
          if(e.z2Ride?.ef)z2Ef.push({label:dl,v:parseFloat(e.z2Ride.ef),date:new Date(d)});
          const sp=Object.entries(e.sets||{}).flatMap(([,a])=>a.filter(s=>s.avgWatts&&Number(s.avgWatts)>0&&Number(s.avgHR)>0));
          if(sp.length){const aw=sp.reduce((s,r)=>s+Number(r.avgWatts),0)/sp.length;const ah=sp.reduce((s,r)=>s+Number(r.avgHR),0)/sp.length;
            spinEf.push({label:dl,v:parseFloat((aw/ah).toFixed(2)),date:new Date(d)});}
        });
        if(!z2Ef.length&&!spinEf.length)return null;
        const all=[...z2Ef,...spinEf].sort((a,b)=>a.date-b.date);
        const labels=[...new Set(all.map(d=>d.label))];
        return <div style={sty.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS}}>EF trend</span>
            <span style={{fontSize:9,color:C.textDim,fontFamily:MONO}}>W/HR</span>
          </div>
          {z2Ef.length>0&&<LineChart data={z2Ef} color={C.blue} unit=""/>}
          {spinEf.length>0&&<LineChart data={spinEf} color={C.amber} unit=""/>}
          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:2}}>
            {z2Ef.length>0&&<span style={{fontSize:9,color:C.blue,fontFamily:MONO}}>● Z2{z2Ef.length?` ${z2Ef[z2Ef.length-1].v}`:""}</span>}
            {spinEf.length>0&&<span style={{fontSize:9,color:C.amber,fontFamily:MONO}}>● Spin{spinEf.length?` ${spinEf[spinEf.length-1].v}`:""}</span>}
          </div>
        </div>;
      })()}
      {(()=>{
        const notesLog=Object.entries(gym).filter(([,e])=>e.notes||Object.values(e.exNotes||{}).some(Boolean))
          .sort((a,b)=>b[0].localeCompare(a[0]));
        const cut=chartDays>=9999?null:new Date(new Date().setDate(new Date().getDate()-chartDays));
        const filtered=cut?notesLog.filter(([d])=>new Date(d)>=cut):notesLog;
        if(!filtered.length)return null;
        return <div style={sty.card}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:SANS,marginBottom:8}}>💬 Training Notes</div>
          {filtered.map(([date,entry])=>{
            const dd=`${date.slice(8)}.${date.slice(5,7)}`;
            const pd=entry.day||DAYS[new Date(date+"T12:00:00").getDay()];
            const exN=Object.entries(entry.exNotes||{}).filter(([,v])=>v);
            return(<div key={date} onClick={()=>onGoToDate?.(date)} style={{padding:"6px 0",borderBottom:`1px solid ${C.borderLight}`,cursor:onGoToDate?"pointer":"default"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <span style={{fontSize:11,fontWeight:700,color:C.text,fontFamily:MONO}}>{dd} {pd}</span>
                {entry.feel&&<span style={{fontSize:10}}>{({ok:"💚",pumped:"🔥",twinge:"⚠️",injury:"🔴",sick:"🤢",holiday:"✈️",more:"➕",less:"➖"})[entry.feel]||""}</span>}
              </div>
              {entry.notes&&<div style={{fontSize:11,color:C.text,fontFamily:SANS,lineHeight:1.5,marginBottom:exN.length?3:0}}>
                <span style={{fontWeight:600,color:C.textDim,fontSize:10}}>General: </span>{entry.notes}
              </div>}
              {exN.map(([id,note])=>{const name=resolveExName(id,entry,idMap||{});return(
                <div key={id} style={{fontSize:11,color:C.textMid,fontFamily:SANS,lineHeight:1.4,paddingLeft:8}}>
                  <span style={{fontWeight:600,color:C.textDim,fontSize:10}}>{name}: </span>{note}
                </div>);})}
            </div>);
          })}
        </div>;
      })()}
    </div>);
}

// ─── SCHEDULE ───────────────────────────────────────────────────────────────
function Schedule({gym,saveGym,plan,mesoWeek,setMesoWeek,mesoCycle,setMesoCycle,health,autoExp,plans,dayRange=14,startRest,idMap,exReg}) {
  const [expDate,setExpDate]=useState(null);const [sets,setSets]=useState({});const [notes,setNotes]=useState("");const [bw,setBw]=useState("");const [feel,setFeel]=useState("");
  const [ssOrd,setSsOrd]=useState(null);const [swaps,setSwaps]=useState({});const [ss,setSs2]=useState(null);const [cheerMsg,setCheerMsg]=useState("");
  const [sessionNoteOpen,setSessionNoteOpen]=useState(false);
  const [localMeso,setLocalMeso]=useState(null);const [moveTarget,setMoveTarget]=useState(null);const [exFeel,setExFeel]=useState({});const [exNotes,setExNotes]=useState({});const [z2Ride,setZ2Ride]=useState(null);const [z2Paste,setZ2Paste]=useState("");const [mobility,setMobility]=useState(false);const [notePopup,setNotePopup]=useState(null);
  const todayRef=useRef(null);const editRef=useRef({});const routine=plan?.days||{};
  const wSugg=useMemo(()=>mesoWeek===1?getWeightSuggestions(gym,plan,mesoCycle):{},[gym,plan,mesoCycle,mesoWeek]);

  const gymRef=useRef(gym);gymRef.current=gym;
  const saveGymRef=useRef(saveGym);saveGymRef.current=saveGym;

  useEffect(()=>{editRef.current={date:expDate,sets,notes,bw,ssOrd,feel,swaps,exFeel,exNotes,z2Ride,mobility,planDay:expDate?DAYS[new Date(expDate+"T12:00:00").getDay()]:null};},[expDate,sets,notes,bw,ssOrd,feel,swaps,exFeel,exNotes,z2Ride,mobility]);
  const autoSave=useCallback(()=>{
    const r=editRef.current;if(!r.date||!r.planDay)return;
    if(!Object.values(r.sets).some(a=>a.some(s=>s.done||s.weight||s.reps||s.avgWatts))&&!r.notes&&!r.bw&&!r.z2Ride&&!r.mobility)return;
    saveGymRef.current({...gymRef.current,[r.date]:{day:r.planDay,planId:plan?.id,mesoWeek,mesoCycle,sets:r.sets,notes:r.notes,bodyWeight:r.bw?Number(r.bw):getWeight(gymRef.current,health),ssOrder:r.ssOrd,feel:r.feel||null,exFeel:Object.keys(r.exFeel||{}).length?r.exFeel:null,exNotes:Object.keys(r.exNotes||{}).length?r.exNotes:null,z2Ride:r.z2Ride||null,mobility:r.mobility||false,exSwaps:Object.keys(r.swaps).length?r.swaps:null,ts:new Date().toISOString()}});
  },[plan,mesoWeek,mesoCycle,health]);
  useEffect(()=>()=>autoSave(),[autoSave]);

  useEffect(()=>{if(autoExp){const ds=todayStr();if(expDate!==ds)openDay(ds,DAYS[new Date().getDay()]);setTimeout(()=>todayRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);}},[autoExp]);
  useEffect(()=>{const handler=(e)=>{const ds=e.detail;const pd=DAYS[new Date(ds+"T12:00:00").getDay()];openDay(ds,pd);setTimeout(()=>document.getElementById(`day-${ds}`)?.scrollIntoView({behavior:"smooth",block:"start"}),150);};window.addEventListener("claudefit-goto-date",handler);return()=>window.removeEventListener("claudefit-goto-date",handler);},[]);

  const days=[];const today=new Date();today.setHours(0,0,0,0);
  const futureDays=7;
  const pastDays=dayRange>=9999?Math.max(...Object.keys(gym).map(d=>Math.round((today-new Date(d))/864e5)),0)+1:Math.max(0,dayRange-futureDays);
  for(let i=-pastDays;i<=futureDays;i++){const d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}

  const openDay=(ds,pd)=>{
    if(expDate===ds){setExpDate(null);return;} setExpDate(ds);setNotePopup(null);setSs2(null);setCheerMsg("");setMoveTarget(null);setZ2Paste("");setLocalMeso(null);setSessionNoteOpen(false);
    const logged=gym[ds];
    if(logged){setSets(logged.sets||{});setNotes(logged.notes||"");setBw(logged.bodyWeight?String(logged.bodyWeight):"");setSsOrd(logged.ssOrder||null);setFeel(logged.feel||"");setSwaps(logged.exSwaps||{});setExFeel(logged.exFeel||{});setExNotes(logged.exNotes||{});setZ2Ride(logged.z2Ride||null);setMobility(logged.mobility||false);}
    else{setSets(initSets(routine,pd,mesoWeek,gym));setNotes("");setBw("");setSsOrd(null);setFeel("");setSwaps({});setExFeel({});setExNotes({});setZ2Ride(null);setMobility(false);}
  };
  const logSet=(exId,idx,field,val)=>{setSets(prev=>{const u={...prev,[exId]:[...(prev[exId]||[])]};u[exId][idx]={...u[exId][idx],[field]:val};return u;});};
  const addSet=(ss)=>{setSets(prev=>{const u={...prev};ss.exercises.forEach(ex=>{u[ex.id]=[...(u[ex.id]||[]),{weight:u[ex.id]?.[0]?.weight||"",reps:"",done:false,avgWatts:"",avgHR:"",km:"",duration:""}];});return u;});};
  const rmSet=(ss)=>{setSets(prev=>{const u={...prev};ss.exercises.forEach(ex=>{if((u[ex.id]||[]).length>1)u[ex.id]=u[ex.id].slice(0,-1);});return u;});};
  const moveSS=(idx,dir)=>{const ss2=ssOrd||(routine[DAYS[new Date(expDate+"T12:00:00").getDay()]]?.supersets||[]).map(s=>s.id);const ni=idx+dir;if(ni<0||ni>=ss2.length)return;const n=[...ss2];[n[idx],n[ni]]=[n[ni],n[idx]];setSsOrd(n);};
  const handleDone=(ss,idx)=>{
    const allDone=ss.exercises.every(ex=>sets[ex.id]?.[idx]?.done);
    ss.exercises.forEach(ex=>logSet(ex.id,idx,"done",!allDone));
    if(!allDone){const isSS=ss.exercises.length>1;const tot=(sets[ss.exercises[0].id]||[]).length;startRest(isSS&&idx<tot-1?60:120);}
  };
  const saveDay=(ds,pd)=>{
    const saveBW=bw?Number(bw):getWeight(gym,health);
    const entry={day:pd,planId:plan?.id,mesoWeek,mesoCycle,sets,notes,bodyWeight:saveBW,ssOrder:ssOrd,feel:feel||null,exFeel:Object.keys(exFeel).length?exFeel:null,exNotes:Object.keys(exNotes).length?exNotes:null,z2Ride:z2Ride||null,mobility:mobility||false,exSwaps:Object.keys(swaps).length?swaps:null,ts:new Date().toISOString()};
    saveGym({...gym,[ds]:entry},s=>{setSs2(s);if(s==="saved")setCheerMsg(CHEERS[Math.floor(Math.random()*CHEERS.length)]);});
    setTimeout(()=>{setSs2(null);setCheerMsg("");},3000);
  };
  const resolveSS=(ds,pd)=>{
    let supersets=routine[pd]?.supersets||[];const logged=gym[ds];
    if(logged?.sets){const logIds=Object.keys(logged.sets),planIds=supersets.flatMap(s=>s.exercises.map(e=>e.id));
      if(!logIds.some(id=>planIds.includes(id))&&logIds.length){let found=null;
        for(const p of[...plans,DEFAULT_PLAN]){const d=p.days?.[logged.day];if(!d)continue;if(logIds.some(id=>d.supersets.flatMap(s=>s.exercises.map(e=>e.id)).includes(id))){found=d.supersets;break;}}
        supersets=found||logIds.map(id=>{const rn=resolveExName(id,logged,idMap||{});const regEntry=exReg?.[normName(rn)];
          return{id:`log_${id}`,name:rn,exercises:[{id,name:rn,baseSets:(logged.sets[id]||[]).length,reps:"",baseWeight:0,unit:regEntry?.unit||"kg",trackWatts:regEntry?.trackWatts||/spin/i.test(rn),trackGrip:regEntry?.trackGrip||/pull/i.test(rn)}]};});}}
    const ordered=ssOrd?ssOrd.map(id=>supersets.find(s=>s.id===id)).filter(Boolean):supersets;
    return(ordered.length?ordered:supersets).map(s=>({...s,exercises:s.exercises.map(ex=>swaps[ex.id]?{...ex,name:swaps[ex.id]}:ex)}));
  };
  const curBW=bw?Number(bw):getWeight(gym,health);
  return(
    <div>
      {days.map(date=>{
        const ds=localDate(date),pd=DAYS[date.getDay()];
        const isToday=ds===todayStr(),isPast=date<today,isFuture=date>today;
        const logged=gym[ds];
        // Resolve which plan applies: logged entry's plan for past, active plan for today/future
        let pr=routine[pd];
        if(logged?.planId&&logged.planId!==plan?.id){const lp=[...plans,DEFAULT_PLAN].find(p=>p.id===logged.planId);if(lp?.days?.[pd])pr=lp.days[pd];}
        else if(isPast&&!logged){
          // Unlogged past day — find which plan was active on that date
          const dp=[...plans,DEFAULT_PLAN].find(p=>(p.activations||[]).some(a=>ds>=a.from&&(!a.to||ds<=a.to)));
          if(dp?.days?.[pd])pr=dp.days[pd];
        }
        const isRest=!pr||!pr.supersets.length,isExp=expDate===ds;
        const mesoCol=isExp&&localMeso!=null?MESO[localMeso].color:isToday?MESO[mesoWeek].color:logged?MESO[logged.mesoWeek??0].color:null;
        const setsSource=(isExp?sets:logged?.sets)||{};
        const spinArr=Object.entries(setsSource).flatMap(([,a])=>a.filter(s=>s.avgWatts&&Number(s.avgWatts)>0));
        const avgW=spinArr.length?spinArr.reduce((s,r)=>s+Number(r.avgWatts),0)/spinArr.length:0;
        const avgHR=spinArr.length?spinArr.reduce((s,r)=>s+(Number(r.avgHR)||0),0)/spinArr.length:0;
        const liveBW=isExp&&bw?Number(bw):(logged?.bodyWeight||getWeight(gym,health));
        const wpk=avgW>0&&liveBW?(avgW/liveBW).toFixed(2):null;
        const ef=avgW>0&&avgHR>0?(avgW/avgHR).toFixed(2):null;
        const efWarn=ef&&parseFloat(ef)<1.0;
        const liveFeel=isExp?feel:logged?.feel;
        const feelE={ok:"💚",pumped:"🔥",twinge:"⚠️",injury:"🔴",sick:"🤢",holiday:"✈️",more:"➕",less:"➖"}[liveFeel]||"";
        const liveZ2=isExp?z2Ride:logged?.z2Ride;
        const hasNotes=isExp?(notes||Object.values(exNotes).some(Boolean)):(logged?.notes||Object.values(logged?.exNotes||{}).some(Boolean));
        const canOpen=!isRest||logged?.z2Ride;
        return(
          <div key={ds} id={`day-${ds}`} ref={isToday?todayRef:null} style={{marginBottom:5}}>
            <div onClick={()=>canOpen?openDay(ds,pd):isRest?openDay(ds,pd):null}
              style={{background:isToday?C.yellowLight:isPast&&logged?C.card:isPast?C.cardAlt:C.card,
                border:`1px solid ${isToday?C.yellow:C.border}`,
                borderLeft:mesoCol?`4px solid ${mesoCol}`:`1px solid ${isToday?C.yellow:C.border}`,
                borderRadius:isExp?"10px 10px 0 0":10,padding:"10px 14px",cursor:"pointer",
                display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:isToday?"0 2px 8px rgba(245,197,24,0.2)":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{textAlign:"center",minWidth:30}}>
                  <div style={{fontSize:9,fontWeight:600,color:isToday?C.yellowDark:C.textDim,fontFamily:SANS,textTransform:"uppercase"}}>{pd}</div>
                  <div style={{fontSize:14,fontWeight:800,color:C.text,fontFamily:MONO}}>{date.getDate()}</div>
                </div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:isRest?C.textDim:C.text,fontFamily:SANS}}>{pr?.label||"Rest"}</div>
                  {(logged||isExp)&&!isFuture&&<div style={{fontSize:10,color:C.green,fontFamily:SANS}}>
                    ✓{liveBW?` ${liveBW}kg`:""}{wpk?` · ${wpk} W/kg`:""}{ef?` · EF ${ef}${efWarn?" 🚨":""}`:""}{feelE?` ${feelE}`:""}{(isExp?mobility:logged?.mobility)?" 🧘":""}
                    {hasNotes&&<span onClick={e=>{e.stopPropagation();setNotePopup(notePopup===ds?null:ds);}} style={{cursor:"pointer",padding:"0 2px"}}> 💬</span>}
                  </div>}
                  {liveZ2&&<div style={{fontSize:10,color:C.teal,fontFamily:SANS}}>🚴 Z2: {liveZ2.duration}min{liveZ2.avgW?` · ${liveZ2.avgW}W`:""}{liveZ2.ef?` · EF ${liveZ2.ef}`:""}{liveZ2.dist?` · ${liveZ2.dist}km`:""}</div>}
                  {isFuture&&!isRest&&!liveZ2&&<div style={{fontSize:10,color:C.blue,fontFamily:SANS}}>Planned</div>}
                </div>
              </div>
              <span style={{color:C.textDim,fontSize:12}}>{isExp?"▲":"▼"}</span>
            </div>
            {notePopup===ds&&!isExp&&(()=>{
              const dn=isExp?notes:logged?.notes;
              const den=isExp?exNotes:(logged?.exNotes||{});
              const anyEx=Object.entries(den).filter(([,v])=>v);
              if(!dn&&!anyEx.length) return <div style={{background:C.card,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px"}}><div style={{fontSize:11,color:C.textDim,fontFamily:SANS}}>No notes.</div></div>;
              return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px"}}>
                {dn&&<div style={{fontSize:11,color:C.text,fontFamily:SANS,marginBottom:anyEx.length?6:0}}><span style={{fontWeight:700,color:C.textDim,fontSize:10}}>General:</span> {dn}</div>}
                {anyEx.map(([id,note])=>{const name=resolveExName(id,logged,idMap||{});return(
                  <div key={id} style={{fontSize:11,color:C.text,fontFamily:SANS,padding:"2px 0"}}><span style={{fontWeight:700,color:C.textDim,fontSize:10}}>{name}:</span> {note}</div>);})}
              </div>);
            })()}
            {isExp&&(()=>{
              const sMeso=localMeso!=null?localMeso:(gym[ds]?.mesoWeek??mesoWeek);const m=MESO[sMeso];const resolved=resolveSS(ds,pd);
              const prevPhase=(sMeso+3)%4,nextPhase=(sMeso+1)%4;
              const goBack=async()=>{
                setLocalMeso(prevPhase);
                if(isToday){setMesoWeek(prevPhase);await save(K.meta,{mesoWeek:prevPhase,mesoStart:todayStr(),mesoCycle});setSets(initSets(routine,pd,prevPhase,gym));}
                else{const updated={...gym,[ds]:{...gym[ds],mesoWeek:prevPhase}};saveGym(updated);}
              };
              const goFwd=async()=>{
                setLocalMeso(nextPhase);
                if(isToday){const nc=(nextPhase===0)?mesoCycle+1:mesoCycle;setMesoWeek(nextPhase);setMesoCycle(nc);await save(K.meta,{mesoWeek:nextPhase,mesoStart:todayStr(),mesoCycle:nc});setSets(initSets(routine,pd,nextPhase,gym));}
                else{const updated={...gym,[ds]:{...gym[ds],mesoWeek:nextPhase}};saveGym(updated);}
              };
              return(<div style={{background:C.card,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
                <div style={{display:"flex",userSelect:"none"}}>
                  <div style={{flex:3,background:m.color,padding:"5px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#fff",fontFamily:MONO}}>C{gym[ds]?.mesoCycle||mesoCycle} {sMeso}/3</span>
                    <span style={{fontSize:9,color:"rgba(255,255,255,0.8)",fontFamily:SANS}}>{m.label}</span>
                  </div>
                  {!isFuture&&<div onClick={goBack} style={{flex:1,background:MESO[prevPhase].color,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:0.85}}>
                    <span style={{fontSize:12,color:"#fff",fontWeight:700}}>«</span>
                  </div>}
                  {!isFuture&&<div onClick={goFwd} style={{flex:1,background:MESO[nextPhase].color,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:0.85}}>
                    <span style={{fontSize:12,color:"#fff",fontWeight:700}}>»</span>
                  </div>}
                </div>
                <div style={{padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:11,color:C.textDim,fontFamily:SANS}}>⚖️</span>
                    <input type="number" step="0.1" value={bw} onChange={e=>setBw(e.target.value)} placeholder={String(getWeight(gym,health))} style={sty.input(70)}/>
                    <span style={{fontSize:10,color:C.textDim}}>kg</span>
                  </div>
                  {sMeso===1&&Object.keys(wSugg).length>0&&(()=>{
                    const dayExIds=resolved.flatMap(ss=>ss.exercises.map(e=>e.id));
                    const relevant=dayExIds.filter(id=>wSugg[id]);
                    if(!relevant.length) return null;
                    return(<div style={{background:"rgba(58,140,92,0.06)",border:`1px solid rgba(58,140,92,0.2)`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.green,fontFamily:SANS,marginBottom:4}}>CYCLE {mesoCycle} — WEIGHT SUGGESTIONS (from Accum C{mesoCycle-1})</div>
                      {relevant.map(id=>{const s=wSugg[id];return(<div key={id} style={{fontSize:11,color:C.text,fontFamily:SANS,padding:"2px 0"}}>
                        <span style={{fontWeight:600}}>{s.name}</span>: {s.reason==="owned"?
                          <span style={{color:C.green}}>↑ {s.current}→{s.suggested}kg <span style={{fontSize:9,color:C.textDim}}>(owned top reps)</span></span>:
                          <span style={{color:C.blue}}>→ {s.current}kg <span style={{fontSize:9,color:C.textDim}}>(repeat)</span></span>}
                      </div>);})}
                    </div>);})()}
                  {resolved.length>0&&<ExGrid supersets={resolved} sets={sets} onChange={logSet} onDone={handleDone} bw={curBW} mesoWeek={sMeso} onAdd={addSet} onRemove={rmSet} onMove={!isFuture?(i,d)=>moveSS(i,d):null} onSwap={!isFuture?(id,n)=>setSwaps(p=>({...p,[id]:n})):null} exFeel={exFeel} onExFeel={!isFuture?((id,v)=>setExFeel(p=>({...p,[id]:v||undefined}))):null} exNotes={exNotes} onExNote={!isFuture?((id,v)=>setExNotes(p=>({...p,[id]:v||undefined}))):null} exReg={exReg}/>}
                  {!isFuture&&(<>
                    <div style={{background:C.yellowLight,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                      <div style={{fontSize:11,color:C.textMid,fontFamily:SANS,marginBottom:6}}>How did it feel?</div>
                      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                        {[["🔥","pumped","Pumped"],["💚","ok","Solid"],["⚠️","twinge","Twinge"],["🔴","injury","Pain"],["🤢","sick","Sick"],["✈️","holiday","Holiday"]].map(([em,val,l])=>(
                          <div key={val} onClick={()=>setFeel(feel===val?"":val)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",opacity:feel===val?1:feel?0.3:0.6,transition:"opacity 0.2s"}}>
                            <span style={{fontSize:26}}>{em}</span>
                            <span style={{fontSize:9,color:C.textMid,fontFamily:SANS}}>{l}</span>
                          </div>))}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"stretch"}}>
                      <div onClick={()=>setMobility(!mobility)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,cursor:"pointer",flex:1,
                        background:mobility?"rgba(42,140,122,0.1)":C.cardAlt,border:`1px solid ${mobility?C.teal:C.border}`}}>
                        <span style={{fontSize:16}}>{mobility?"🧘":"⬜"}</span>
                        <span style={{fontSize:12,fontWeight:600,color:mobility?C.teal:C.textDim,fontFamily:SANS}}>Mobility done</span>
                      </div>
                      <div onClick={()=>setSessionNoteOpen(!sessionNoteOpen)} style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 14px",borderRadius:8,cursor:"pointer",
                        background:notes?C.cardAlt:C.cardAlt,border:`1px solid ${notes?C.blue:C.border}`}}>
                        <span style={{fontSize:16,opacity:notes?1:0.4}}>💬</span>
                      </div>
                    </div>
                    {sessionNoteOpen&&<textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Session notes…" autoFocus style={{width:"100%",borderRadius:8,border:`1px solid ${C.border}`,background:C.cardAlt,padding:"8px 10px",fontSize:12,color:C.text,minHeight:40,resize:"vertical",boxSizing:"border-box",marginBottom:8,fontFamily:SANS,outline:"none"}}/>}
                    {z2Ride&&<div style={{background:"rgba(42,140,122,0.08)",border:`1px solid rgba(42,140,122,0.25)`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.teal,fontFamily:SANS,marginBottom:4}}>🚴 Z2 RIDE</div>
                      <div style={{fontSize:11,color:C.text,fontFamily:MONO,lineHeight:1.8}}>
                        {z2Ride.duration}min{z2Ride.avgW?` · ${z2Ride.avgW}W`:""}{z2Ride.avgHR?` · HR ${z2Ride.avgHR}`:""}{z2Ride.ef?` · EF ${z2Ride.ef}`:""}{z2Ride.dist?` · ${z2Ride.dist}km`:""}{z2Ride.spd?` · ${z2Ride.spd}km/h`:""}{z2Ride.rpe?` · RPE ${z2Ride.rpe}`:""}{z2Ride.p20min?` · 20m:${z2Ride.p20min}W`:""}{z2Ride.sweat?` · 💧${z2Ride.sweat}kg`:""}
                      </div>
                      <span onClick={()=>{setZ2Ride(null);setZ2Paste("");}} style={{fontSize:10,color:C.red,cursor:"pointer",fontFamily:SANS}}>✕ Remove</span>
                    </div>}
                    {!z2Ride&&<div style={{display:"flex",gap:4,marginBottom:8,alignItems:"center"}}>
                      <input value={z2Paste} onChange={e=>setZ2Paste(e.target.value)} placeholder="Paste Z2| ride data…" style={{flex:1,...sty.input(100),textAlign:"left",fontSize:10,fontFamily:MONO}}/>
                      <button onClick={()=>{const r=parseZ2Ride(z2Paste);if(r){setZ2Ride(r);setZ2Paste("");}}} disabled={!z2Paste.trim()} style={sty.btn(C.teal,true)}>🚴</button>
                    </div>}
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <button onClick={()=>saveDay(ds,pd)} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",cursor:"pointer",background:ss==="saved"?C.green:C.yellow,color:C.dark,fontWeight:700,fontSize:13,fontFamily:SANS}}>
                        {ss==="saving"?"Saving…":ss==="saved"?"✓ Saved":"Save Session"}</button>
                      {moveTarget===ds?(<div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <input type="date" id="moveDate" defaultValue="" style={{background:C.cardAlt,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 8px",fontSize:11,fontFamily:MONO,color:C.text,outline:"none"}}/>
                        <span onClick={async()=>{const tgt=document.getElementById("moveDate")?.value;if(!tgt||tgt===ds)return;
                          const tgtPd=DAYS[new Date(tgt+"T12:00:00").getDay()];
                          const entry={day:tgtPd,planId:plan?.id,mesoWeek,mesoCycle,sets,notes,bodyWeight:bw?Number(bw):getWeight(gym,health),ssOrder:ssOrd,feel:feel||null,exSwaps:Object.keys(swaps).length?swaps:null,ts:new Date().toISOString(),movedFrom:ds};
                          const updated={...gym,[tgt]:entry};delete updated[ds];
                          saveGym(updated);setExpDate(null);setMoveTarget(null);
                        }} style={{fontSize:11,color:C.green,cursor:"pointer",fontWeight:700}}>✓</span>
                        <span onClick={()=>setMoveTarget(null)} style={{fontSize:11,color:C.red,cursor:"pointer"}}>✕</span>
                      </div>):(<button onClick={()=>setMoveTarget(ds)} style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${C.border}`,cursor:"pointer",background:C.cardAlt,color:C.textMid,fontWeight:600,fontSize:11,fontFamily:SANS}}>📅 Move</button>)}
                    </div>

                  </>)}
                </div>
              </div>);})()}
          </div>);
      })}

}

// ─── GYM TRACKER ────────────────────────────────────────────────────────────

    </div>

    {view==="meso"&&<><div style={{fontSize:11,color:C.blue,fontFamily:SANS,fontWeight:600,cursor:"pointer",marginBottom:6}} onClick={()=>setView("schedule")}>← Schedule</div><div style={{...sty.card,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

          <span onClick={async()=>{const v=parseInt(cycleEdit);if(v>0){setMesoCycle(v);await save(K.meta,{mesoWeek,mesoStart:todayStr(),mesoCycle:v});}setCycleEdit(null);}} style={{fontSize:11,color:C.green,cursor:"pointer",fontWeight:700}}>✓</span>
          <span onClick={()=>setCycleEdit(null)} style={{fontSize:11,color:C.red,cursor:"pointer"}}>✕</span>
        </div>):(<span onClick={()=>setCycleEdit(String(mesoCycle))} style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:MONO,cursor:"pointer",borderBottom:`1px dotted ${C.textDim}`,padding:"0 4px"}}>{mesoCycle}</span>)}
      </div>
      <span style={{fontSize:11,color:C.textDim,fontFamily:MONO}}>Phase {mesoWeek}/3</span>
    </div>
    {MESO.map((w,i)=>(<div key={i} onClick={()=>advMeso(i)} style={{background:i===mesoWeek?w.color:C.card,color:i===mesoWeek?"#fff":C.text,border:`2px solid ${i===mesoWeek?w.color:C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700,fontSize:14,fontFamily:SANS}}>{w.label}</span><span style={{fontSize:13,fontWeight:800,fontFamily:MONO}}>{i}/3</span></div>
      <div style={{fontSize:11,fontFamily:SANS,opacity:0.8,lineHeight:1.6}}>{i===0?"Recovery. Minimal volume, light weight. Let the body adapt.":i===1?"Base volume at plan values. Establish patterns, bottom of rep ranges.":i===2?"Volume ×1.2, weight ×1.05. Mid-to-upper rep ranges.":"Peak volume ×1.2, weight ×1.10. Top of rep ranges, near failure. Higher reps not more sets."}</div>
      <div style={{fontSize:10,fontFamily:MONO,marginTop:4,opacity:0.6}}>Sets ×{w.sx} · Weight ×{w.wx}</div>
    </div>))}</>}

// ─── ERROR BOUNDARY ────────────────────────────────────────────────────────
class ErrorGuard extends React.Component {
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  render(){if(this.state.err)return(<div style={{padding:20,textAlign:"center"}}><div style={{fontSize:14,color:C.red,fontWeight:700,fontFamily:SANS,marginBottom:8}}>Page error</div><div style={{fontSize:11,color:C.textDim,fontFamily:MONO,whiteSpace:"pre-wrap",maxHeight:120,overflow:"auto"}}>{String(this.state.err)}</div><button onClick={()=>this.setState({err:null})} style={{marginTop:10,...sty.btn(C.surface,true)}}>Retry</button></div>);return this.props.children;}
}

// ─── FOOD ───────────────────────────────────────────────────────────────────
function Food({health,saveH,profile}) {
  const [tab,setTab]=useState("notes");const [mealText,setMealText]=useState("");const [parsed,setParsed]=useState(null);const [saveMode,setSaveMode]=useState("add");
  const [ss,setSs]=useState(null);const [foodNotes,setFoodNotes]=useState("");const [notesSS,setNotesSS]=useState(null);
  const [notesLoad,setNotesLoad]=useState(false);const photoRef=useRef(null);
  const [favs,setFavs]=useState([]);const [qCal,setQCal]=useState("");const [qProt,setQProt]=useState("");const [qName,setQName]=useState("");const [qDate,setQDate]=useState(todayStr());
  const [expDate,setExpDate]=useState(null);const [histDays,setHistDays]=useState(7);const [confirmDel,setConfirmDel]=useState(null);const [mealSort,setMealSort]=useState("time");
  const [searchQ,setSearchQ]=useState("");
  const [searchAdd,setSearchAdd]=useState(null);const [searchTime,setSearchTime]=useState("");const [searchDate,setSearchDate]=useState(todayStr());
  const addFromSearch=(meal)=>{
    const t=searchTime||"";const d=searchDate||todayStr();
    const line=`MEAL|${d}|${t}|${meal.name}|${meal.calories}|${meal.protein_g||0}|${meal.carbs_g||0}|${meal.fat_g||0}|${meal.description||""}`;
    setMealText(p=>p?(p+"\n"+line):line);setSearchAdd(null);setSearchTime("");setSearchDate(todayStr());setTab("log");
  };
  // Build personal food database from meal history
  const foodDb=useMemo(()=>{
    const db={};
    health.forEach(e=>{(e.meals||[]).forEach(m=>{
      const key=(m.name||"").toLowerCase().trim();if(!key||!m.calories)return;
      if(!db[key])db[key]={name:m.name,cal:[],prot:[],fat:[],carbs:[],desc:m.description||""};
      db[key].cal.push(m.calories);db[key].prot.push(m.protein_g||0);db[key].fat.push(m.fat_g||0);db[key].carbs.push(m.carbs_g||0);
      if(m.description&&m.description.length>db[key].desc.length)db[key].desc=m.description;
    });});
    return Object.values(db).map(f=>({name:f.name,cal:Math.round(f.cal.reduce((a,b)=>a+b,0)/f.cal.length),
      prot:Math.round(f.prot.reduce((a,b)=>a+b,0)/f.prot.length),fat:Math.round(f.fat.reduce((a,b)=>a+b,0)/f.fat.length),
      carbs:Math.round(f.carbs.reduce((a,b)=>a+b,0)/f.carbs.length),count:f.cal.length,desc:f.desc})).sort((a,b)=>b.count-a.count);
  },[health]);
  const qMatches=qName.trim().length>=2?foodDb.filter(f=>f.name.toLowerCase().includes(qName.trim().toLowerCase())).slice(0,5):[];
  useEffect(()=>{load(K.foodNotes).then(d=>{if(d)setFoodNotes(d);});load(K.favMeals).then(d=>{if(d)setFavs(d);});},[]);
  useEffect(()=>{const handler=(e)=>{setTab("history");setHistDays(9999);setExpDate(e.detail);};window.addEventListener("claudefit-goto-food",handler);return()=>window.removeEventListener("claudefit-goto-food",handler);},[]);
  const saveNotes=(t)=>{setFoodNotes(t);optimisticSave(K.foodNotes,t,null,s=>{setNotesSS(s);setTimeout(()=>setNotesSS(null),2000);});};
  const addFav=async(m)=>{const u=[...favs,{...m,id:`fav_${Date.now()}`}];setFavs(u);await save(K.favMeals,u);};
  const rmFav=async(id)=>{const u=favs.filter(f=>f.id!==id);setFavs(u);await save(K.favMeals,u);};
  const logFav=(m)=>{const line=`MEAL|${todayStr()}|${m.time||""}|${m.name}|${m.calories}|${m.protein_g}|${m.carbs_g}|${m.fat_g}|${m.description||""}`;setMealText(p=>p?(p+"\n"+line):line);setTab("log");};
  const quickAdd=()=>{if(!qCal)return;const d=qDate||todayStr();const line=`MEAL|${d}||${qName||"Quick"}|${qCal}|${qProt||0}|0|0|`;setMealText(p=>p?(p+"\n"+line):line);setQCal("");setQProt("");setQName("");setQDate(todayStr());setTab("log");};
  const processNotes=async()=>{if(!foodNotes.trim()||notesLoad)return;setNotesLoad(true);try{
    const text=await askClaude(profile?.apiKey,`Convert food notes to MEAL lines. Group items eaten at the same sitting into ONE meal line (e.g. "eggs, toast, coffee" = one "Breakfast" line with combined macros, items in description). Date: ${todayStr()} unless specified.\n\nFormat: MEAL|date|time|name|calories:n|protein:n|carbs:n|fat:n|description\n\nNotes:\n${foodNotes}\n\nONLY MEAL lines, no explanations.`);
    if(text.startsWith("No API key")||text.startsWith("API error")||text.startsWith("Connection")||text.startsWith("Request timed")){alert(text);}
    else{const meals=parseMeals(text);if(meals.length){setMealText(text);setParsed(meals);setTab("log");}}}catch{}finally{setNotesLoad(false);}};
  const processPhoto=async(file)=>{if(!file||notesLoad)return;setNotesLoad(true);try{
    const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=()=>j();rd.readAsDataURL(file);});
    const text=await askClaude(profile?.apiKey,`Photo meal. Group into ONE meal. Date: ${todayStr()}.\nMEAL|date|time|name|calories:n|protein:n|carbs:n|fat:n|description\nONLY MEAL lines.`,600,{type:file.type||"image/jpeg",data:b64});
    if(text.startsWith("No API key")||text.startsWith("API error")||text.startsWith("Connection")||text.startsWith("Request timed")){alert(text);}
    else{const meals=parseMeals(text);if(meals.length){setMealText(text);setParsed(meals);setTab("log");}}}catch{}finally{setNotesLoad(false);}};
  const confirmSave=async()=>{if(!parsed?.length)return;setSs("saving");const byDate={};parsed.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});

      const all=saveMode==="add"?[...(ex.meals||[]),...meals]:meals;const t=all.reduce((a,m)=>({cal:a.cal+m.calories,p:a.p+m.protein_g,f:a.f+m.fat_g,c:a.c+m.carbs_g}),{cal:0,p:0,f:0,c:0});
      nl=[...nl.filter(e=>e.date!==date),{...ex,meals:all,calories:String(Math.round(t.cal)),protein:String(Math.round(t.p)),fat:String(Math.round(t.f)),carbs:String(Math.round(t.c))}];});
    nl.sort((a,b)=>a.date.localeCompare(b.date));saveH(nl,s=>{setSs(s);if(s==="saved"){setParsed(null);setMealText("");setTimeout(()=>{setSs(null);setTab("history");},1500);}else setTimeout(()=>setSs(null),2500);});};
  return(<div>

    {tab==="notes"&&(<div style={{display:"flex",flexDirection:"column",gap:12}}>

          {!profile?.apiKey&&<div style={{fontSize:9,color:C.red,fontFamily:SANS}}>Set API key in Settings → Profile</div>}
        </div></div>

          <div style={{display:"flex",gap:6}}><span onClick={()=>logFav(f)} style={{fontSize:11,color:C.green,cursor:"pointer"}}>+Log</span><span onClick={()=>rmFav(f.id)} style={{fontSize:11,color:C.red,cursor:"pointer"}}>✕</span></div></div>))}

      {(()=>{const cut=new Date();cut.setDate(cut.getDate()-histDays);

              {e.meals?.length>0&&<div style={{marginTop:6,textAlign:"right"}}>

                  <span style={{fontSize:10,color:C.textMid,fontFamily:SANS}}>Delete meals?</span>

                </div>
              </div>
              <div style={{display:"flex",gap:8,fontSize:11,fontFamily:MONO,marginTop:2}}>
                <span style={{color:C.text}}>{r.meal.calories}kcal</span>
